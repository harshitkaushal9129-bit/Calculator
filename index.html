<!DOCTYPE html>
<html lang="hi">  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI PLAYER PRO - Full Elite Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ffcc">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        :root { --main-clr: #00ffcc; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.85); --hacker-green: #00ff41; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; background-image: radial-gradient(circle at center, #0a1a1a 0%, #000 100%); }
        .phone { width: 380px; height: 800px; background: var(--bg-dark); border: 10px solid #1a1a1a; border-radius: 50px; position: relative; overflow: hidden; box-shadow: 0 0 60px rgba(0, 255, 204, 0.1); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        .phone.laptop-view { width: 95vw; height: 90vh; border-radius: 15px; border-width: 4px; }
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        .status-bar { height: 40px; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; }
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 55px; background: rgba(0,0,0,0.85); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(15px); z-index: 100; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-icon { width: 20px; height: 20px; border: 2px solid #666; cursor: pointer; }
        .nav-back { clip-path: polygon(100% 0, 0 50%, 100% 100%); }
        .nav-home { border-radius: 50%; }
        .nav-recent { border-radius: 4px; }
        .header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
        #info-menu { position: absolute; top: 75px; right: 25px; width: 250px; background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; display: none; z-index: 2000; max-height: 400px; overflow-y: auto; }
        .menu-topic-head { font-size: 10px; color: var(--main-clr); margin: 15px 8px 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .menu-link { display: block; color: #ccc; text-decoration: none; padding: 10px; font-size: 13px; border-radius: 12px; transition: 0.3s; }
        .menu-link:hover { background: rgba(0, 255, 204, 0.1); color: var(--main-clr); }
        .visualizer-container { width: 240px; height: 240px; position: relative; display: flex; justify-content: center; align-items: center; }
        #v-canvas { position: absolute; filter: drop-shadow(0 0 10px var(--main-clr)); }
        .image-container { width: 160px; height: 160px; border-radius: 50%; background: #111; overflow: hidden; z-index: 2; display: flex; justify-content: center; align-items: center; border: 4px solid #000; }
        #main-thumb { width: 100%; height: 100%; object-fit: cover; }
        .video-box { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 18px; overflow: hidden; display: none; margin: 15px 0; border: 1px solid rgba(255, 255, 255, 0.08); position: relative; }
        #main-video { width: 100%; height: 100%; object-fit: contain; }
        .play-btn { width: 70px; height: 70px; border-radius: 50%; background: var(--main-clr); border: none; color: #000; font-size: 28px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 255, 204, 0.4); }
        .tool-select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 15px; border-radius: 12px; font-size: 11px; cursor: pointer; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 5000; backdrop-filter: blur(12px); }
        .card { width: 88%; background: #0e0e0e; padding: 25px; border-radius: 30px; border: 1px solid #1a1a1a; }
        .btn-main { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: 800; background: var(--main-clr); color: #000; cursor: pointer; }
        .playlist-sidebar { width: 0; background: #080808; border-left: 1px solid #1a1a1a; transition: 0.4s; overflow-y: auto; }
        .laptop-view .playlist-sidebar { width: 300px; }
        .playlist-item { padding: 15px; border-bottom: 1px solid #111; font-size: 13px; color: #888; cursor: pointer; }
        .playlist-item.active { color: var(--main-clr); background: rgba(0,255,204,0.05); }
        .seek-overlay { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(0, 255, 204, 0.3); padding: 15px; border-radius: 50%; opacity: 0; transition: 0.3s; pointer-events: none; }
    </style>
</head>
<body>

<div class="phone" id="main-frame">
    <div class="screen">
        <div class="status-bar">
            <div id="android-time">12:00</div>
            <div style="display:flex; gap:10px; align-items:center;">
                <span id="net-speed" style="color:var(--hacker-green); font-size:10px;">0.0 KB/s</span>
                <span id="android-battery" style="color:var(--main-clr); font-size:12px;">🔋 --%</span>
            </div>
        </div>

        <div class="header">
            <div onclick="toggleUserList(event)" style="cursor:pointer; font-size:20px;">👤</div>
            <div style="text-align:center">
                <span style="color:var(--main-clr); font-weight:900; letter-spacing:1px;">MI PLAYER PRO</span>
            </div>
            <div onclick="toggleMenu(event)" style="cursor:pointer; color:var(--main-clr); font-size:24px;">⋮</div>
        </div>

        <div id="info-menu">
            <div style="padding:10px; border-bottom:1px solid #222; display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                <div onclick="triggerUpdate()" style="position:relative; cursor:pointer;">
                    <img id="menu-user-img" style="width:40px; height:40px; border-radius:50%; object-fit:cover; display:none; border:2px solid var(--main-clr);">
                    <div id="menu-p-icon" style="width:40px; height:40px; border-radius:50%; background:var(--main-clr); color:#000; display:flex; align-items:center; justify-content:center; font-weight:bold;">K</div>
                    <div style="position:absolute; bottom:-2px; right:-2px; background:#000; border-radius:50%; font-size:10px; padding:2px;">✏️</div>
                </div>
                <div>
                    <div id="menu-user-name" style="font-size:13px; font-weight:bold;">Elite Member</div>
                    <div style="font-size:9px; color:var(--main-clr);">MI PRO ACCESS</div>
                </div>
            </div>
            <div class="menu-topic-head">Smart Controls</div>
            <label class="menu-link" style="cursor:pointer;">📄 Open PDF Document <input type="file" accept=".pdf" style="display:none;" onchange="handleFiles(event, 'pdf')"></label>
            <a href="#" onclick="setSleep(30)" class="menu-link">🌙 Sleep Timer (30m)</a>
            <div class="menu-topic-head">System</div>
            <a href="#" onclick="toggleLaptopView()" class="menu-link">🖥️ Desktop Mode</a>
            <a href="#" onclick="location.reload()" class="menu-link">🔄 Refresh Player</a>
            <a href="https://wa.me/9129191898" class="menu-link">💬 Contact Kaushal Ji</a>
        </div>

        <div id="reg-overlay" class="overlay">
            <div class="card">
                <h3 style="color:var(--main-clr); text-align:center; margin-bottom:15px;">New Elite Member</h3>
                <input type="text" id="reg-name" placeholder="Name" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:#fff; border-radius:10px;">
                <input type="number" id="reg-phone" placeholder="Phone (Login ID)" style="width:100%; padding:10px; margin-bottom:10px; background:#111; border:1px solid #333; color:#fff; border-radius:10px;">
                <input type="password" id="reg-pass" placeholder="Password" style="width:100%; padding:10px; margin-bottom:15px; background:#111; border:1px solid #333; color:#fff; border-radius:10px;">
                <button class="btn-main" onclick="registerUser()">Register</button>
                <p onclick="document.getElementById('reg-overlay').style.display='none'" style="text-align:center; margin-top:15px; font-size:12px; color:red; cursor:pointer;">Cancel</p>
            </div>
        </div>

        <div class="main-layout" style="display:flex; flex:1; overflow:hidden;">
            <div style="flex:1; display:flex; flex-direction:column; align-items:center; padding:20px; overflow-y:auto;">
                <div id="user-display-name" style="font-weight:bold; font-size:18px;">Guest</div>
                <div id="user-display-phone" style="font-size:11px; color:var(--main-clr); margin-bottom:20px;">Standby</div>

                <div class="visualizer-container" id="visual-area">
                    <canvas id="v-canvas"></canvas>
                    <div class="image-container" id="p-circle">
                        <img id="main-thumb" style="display:none;">
                        <div id="music-icon" style="font-size:50px;">🎵</div>
                    </div>
                </div>

                <div class="video-box" id="v-box">
                    <video id="main-video" controls style="width:100%; height:100%;"></video>
                    <div id="seek-left" class="seek-overlay" style="left:10%;">⏪ -10s</div>
                    <div id="seek-right" class="seek-overlay" style="right:10%;">10s ⏩</div>
                </div>

                <img id="pdf-viewer" style="display:none; width:90%; border-radius:15px; margin:15px 0;">

                <h4 id="now-playing" style="font-size:12px; color:#666; margin:20px 0; text-align:center; width:80%; overflow:hidden; white-space:nowrap; text-overflow:ellipsis;">Awaiting stream...</h4>

                <div style="width:90%;">
                    <input type="range" id="seek-bar" value="0" style="width:100%; cursor:pointer;">
                    <div style="display:flex; justify-content:space-between; font-size:11px; color:var(--main-clr); margin-top:5px;">
                        <span id="time-curr">0:00</span>
                        <span id="time-total">0:00</span>
                    </div>
                </div>

                <div style="display:flex; align-items:center; gap:40px; margin:30px 0;">
                    <button onclick="playPrev()" style="background:none; border:none; color:#fff; font-size:30px; cursor:pointer;">⏮</button>
                    <button id="master-play" class="play-btn" onclick="togglePlayback()">▶</button>
                    <button onclick="playNext()" style="background:none; border:none; color:#fff; font-size:30px; cursor:pointer;">⏭</button>
                </div>

                <div style="display:flex; gap:10px;">
                    <label class="tool-select">📂 AUDIO<input type="file" multiple accept="audio/*" style="display:none;" onchange="handleFiles(event, 'music')"></label>
                    <label class="tool-select">🎬 VIDEO<input type="file" multiple accept="video/*" style="display:none;" onchange="handleFiles(event, 'video')"></label>
                </div>
                <button onclick="openRegister()" style="margin-top:20px; background:none; border:1px solid #333; color:#555; padding:5px 15px; border-radius:10px; font-size:10px;">Register New Account</button>
            </div>

            <div class="playlist-sidebar" id="sidebar">
                <div style="padding:20px; font-size:11px; color:var(--main-clr); border-bottom:1px solid #111;">PLAYLIST QUEUE</div>
                <div id="sidebar-items"></div>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-icon nav-back" onclick="location.reload()"></div>
            <div class="nav-icon nav-home"></div>
            <div class="nav-icon nav-recent" onclick="toggleUserList(event)"></div>
        </div>
    </div>
</div>

<input type="file" id="pic-update-input" style="display:none" accept="image/*" onchange="handlePicUpdate(event)">

<script>
    const firebaseConfig={apiKey:"AIzaSyDQ0Y8M9OGSInOlUltuysgmKOYGKX8dQvg",authDomain:"calculator-by-kaushalji.firebaseapp.com",databaseURL:"https://calculator-by-kaushalji-default-rtdb.firebaseio.com",projectId:"calculator-by-kaushalji",storageBucket:"calculator-by-kaushalji.firebasestorage.app",messagingSenderId:"156130281294",appId:"1:156130281294:web:73b80a5f344daeabdd001f"};
    firebase.initializeApp(firebaseConfig);
    const db=firebase.database();

    let users=[], currentUserIdx=0, playlist=[], trackIdx=0, mode='music', audio=new Audio(), video=document.getElementById('main-video'), activeMedia=audio, audioCtx, analyser, canvas, ctx, lastTap=0;

    function initApp(){
        db.ref('users').on('value', snap => {
            users=[{name:"Guest",phone:"Standby",pass:"",img:null}];
            if(snap.val()) Object.values(snap.val()).forEach(u => users.push(u));
            const saved = localStorage.getItem('mi_phone');
            if(saved) { const found = users.findIndex(u=>u.phone===saved); if(found!==-1) currentUserIdx=found; }
            updateProfileUI();
        });
    }

    function updateProfileUI(musicThumb=null){
        const u = users[currentUserIdx];
        document.getElementById('menu-user-name').innerText = u.name;
        document.getElementById('user-display-name').innerText = u.name;
        document.getElementById('user-display-phone').innerText = u.phone;
        
        const mImg = document.getElementById('menu-user-img');
        const mIcon = document.getElementById('menu-p-icon');
        if(u.img){ mImg.src=u.img; mImg.style.display='block'; mIcon.style.display='none'; }
        else { mImg.style.display='none'; mIcon.style.display='flex'; mIcon.innerText=u.name[0]; }

        const mainThumb = document.getElementById('main-thumb');
        const musicIcon = document.getElementById('music-icon');
        const displayPic = musicThumb || u.img;
        if(displayPic){ mainThumb.src=displayPic; mainThumb.style.display='block'; musicIcon.style.display='none'; }
        else { mainThumb.style.display='none'; musicIcon.style.display='block'; }
    }

    function triggerUpdate(){ if(users[currentUserIdx].phone!=="Standby") document.getElementById('pic-update-input').click(); }
    function handlePicUpdate(e){ const f=e.target.files[0]; if(!f) return; const r=new FileReader(); r.onload=ev=>{ db.ref('users/'+users[currentUserIdx].phone).update({img:ev.target.result}); }; r.readAsDataURL(f); }

    function handleFiles(e,m){ playlist=Array.from(e.target.files); mode=m; if(playlist.length>0) playTrack(0); }

    function playTrack(i){
        trackIdx=i; const file=playlist[i], url=URL.createObjectURL(file);
        document.getElementById('now-playing').innerText = "Streaming: " + file.name;
        document.getElementById('v-box').style.display='none';
        document.getElementById('pdf-viewer').style.display='none';
        document.getElementById('visual-area').style.display='none';
        audio.pause(); video.pause();

        if(mode==='video'){
            activeMedia=video; video.src=url; document.getElementById('v-box').style.display='flex'; video.play(); updateProfileUI();
        } else if(mode==='music'){
            activeMedia=audio; audio.src=url; document.getElementById('visual-area').style.display='flex'; audio.play();
            window.jsmediatags.read(file, { onSuccess: tag => {
                const p=tag.tags.picture; if(p){ let b64=""; for(let j=0;j<p.data.length;j++) b64+=String.fromCharCode(p.data[j]); updateProfileUI("data:"+p.format+";base64,"+window.btoa(b64)); } else updateProfileUI();
            }, onError: () => updateProfileUI()});
        } else if(mode==='pdf'){
            const reader = new FileReader(); reader.onload=ev=>{ document.getElementById('pdf-viewer').src=ev.target.result; document.getElementById('pdf-viewer').style.display='block'; }; reader.readAsDataURL(file);
        }
        setupVisuals(); renderSidebar(); updatePlayBtn('⏸');
        activeMedia.onloadedmetadata=()=>{ document.getElementById('seek-bar').max=activeMedia.duration; document.getElementById('time-total').innerText=formatTime(activeMedia.duration); };
        activeMedia.ontimeupdate=()=>{ document.getElementById('seek-bar').value=activeMedia.currentTime; document.getElementById('time-curr').innerText=formatTime(activeMedia.currentTime); };
        activeMedia.onended=()=>playNext();
    }

    function setupVisuals(){
        if(audioCtx) return; audioCtx=new(window.AudioContext||window.webkitAudioContext)(); analyser=audioCtx.createAnalyser();
        const s1=audioCtx.createMediaElementSource(audio), s2=audioCtx.createMediaElementSource(video);
        s1.connect(analyser); s2.connect(analyser); analyser.connect(audioCtx.destination);
        canvas=document.getElementById('v-canvas'); ctx=canvas.getContext('2d'); canvas.width=220; canvas.height=220; drawVisuals();
    }

    function drawVisuals(){
        requestAnimationFrame(drawVisuals); let data=new Uint8Array(analyser.frequencyBinCount); analyser.getByteFrequencyData(data);
        ctx.clearRect(0,0,220,220); for(let i=0; i<60; i++){
            let val=data[i*2]/4, rad=(i*Math.PI*2)/60; ctx.strokeStyle=`hsl(${(i/60)*360},100%,50%)`; ctx.lineWidth=2;
            ctx.beginPath(); ctx.moveTo(110+Math.cos(rad)*75, 110+Math.sin(rad)*75);
            ctx.lineTo(110+Math.cos(rad)*(75+val), 110+Math.sin(rad)*(75+val)); ctx.stroke();
        }
    }

    function togglePlayback(){ activeMedia.paused?(activeMedia.play(),updatePlayBtn('⏸')):(activeMedia.pause(),updatePlayBtn('▶')); }
    function updatePlayBtn(txt){ document.getElementById('master-play').innerText=txt; }
    function playNext(){ if(trackIdx<playlist.length-1) playTrack(trackIdx+1); }
    function playPrev(){ if(trackIdx>0) playTrack(trackIdx-1); }
    function formatTime(s){ let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; }
    function toggleMenu(e){ e.stopPropagation(); const m=document.getElementById('info-menu'); m.style.display=m.style.display==='block'?'none':'block'; }
    function toggleLaptopView(){ document.getElementById('main-frame').classList.toggle('laptop-view'); }
    function openRegister(){ document.getElementById('reg-overlay').style.display='flex'; }
    function registerUser(){
        const n=document.getElementById('reg-name').value, p=document.getElementById('reg-phone').value, pw=document.getElementById('reg-pass').value;
        if(!n||!p||!pw) return alert("Fill all details!");
        db.ref('users/'+p).set({name:n,phone:p,pass:pw,img:null}).then(()=>{ alert("Registered!"); document.getElementById('reg-overlay').style.display='none'; });
    }
    function renderSidebar(){
        const c=document.getElementById('sidebar-items'); c.innerHTML='';
        playlist.forEach((f,idx)=>{ const d=document.createElement('div'); d.className=`playlist-item ${idx===trackIdx?'active':''}`; d.innerText=`${idx+1}. ${f.name}`; d.onclick=()=>playTrack(idx); c.appendChild(d); });
    }

    video.addEventListener('click', e => {
        const now = new Date().getTime(), diff = now - lastTap;
        if(diff < 300 && diff > 0){
            const rect=video.getBoundingClientRect(), x=e.clientX-rect.left;
            if(x > rect.width/2){ video.currentTime+=10; showSeek('right'); } else { video.currentTime-=10; showSeek('left'); }
        } lastTap=now;
    });
    function showSeek(s){ const el=document.getElementById('seek-'+s); el.style.opacity="1"; setTimeout(()=>el.style.opacity="0", 500); }
    document.getElementById('seek-bar').oninput=function(){ activeMedia.currentTime=this.value; };
    window.onclick=()=>{ document.getElementById('info-menu').style.display='none'; };
    
    // Time & Battery
    setInterval(()=>{
        const n=new Date(); document.getElementById('android-time').innerText = n.getHours().toString().padStart(2,'0')+":"+n.getMinutes().toString().padStart(2,'0');
        if(navigator.getBattery) navigator.getBattery().then(b=>{ document.getElementById('android-battery').innerText=`🔋 ${Math.round(b.level*100)}%`; });
    }, 1000);

    initApp();
</script>
</body>
</html>
