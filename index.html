<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MI PLAYER PRO | Next-Gen UI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --accent: #00f2ff; 
            --accent-glow: rgba(0, 242, 255, 0.5); 
            --bg: #000000; 
            --surface: rgba(30, 41, 59, 0.7); 
            --card-bg: rgba(15, 23, 42, 0.9);
            --text-main: #ffffff; 
            --text-dim: #94a3b8; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            overflow-y: auto; 
            min-height: 100vh;
        }

        .app-container { 
            width: 100%; 
            max-width: 450px; 
            margin: 0 auto; 
            position: relative; 
            min-height: 100vh;
            padding-bottom: 150px; 
            background: radial-gradient(circle at top right, #0f172a, #000000);
        }

        header { 
            padding: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .brand { font-weight: 900; letter-spacing: 2px; font-size: 18px; color: var(--accent); font-style: italic; }
        .header-icons { display: flex; gap: 20px; font-size: 20px; color: var(--accent); cursor: pointer; }

        .visual-box { 
            height: 350px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
        }
        #canvas-v { width: 300px; height: 300px; filter: drop-shadow(0 0 20px var(--accent-glow)); }
        .art-circle { 
            position: absolute; 
            width: 140px; 
            height: 140px; 
            background: #1e293b; 
            border-radius: 50%; 
            border: 4px solid var(--accent); 
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 25px var(--accent-glow);
        }
        .art-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* --- INFO PANEL MODAL --- */
        .overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); z-index: 2000;
        }
        .system-panel {
            display: none; position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%); width: 320px;
            background: var(--card-bg); border-radius: 35px;
            padding: 30px; z-index: 2001; text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .panel-video-box {
            width: 110px; height: 110px; border-radius: 50%;
            margin: -75px auto 20px; border: 3px solid var(--accent);
            overflow: hidden; background: #000; box-shadow: 0 0 20px var(--accent-glow);
        }
        .panel-video-box video { width: 100%; height: 100%; object-fit: cover; }

        .section-tag { 
            color: var(--accent); 
            font-size: 10px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            border-left: 3px solid var(--accent); 
            padding-left: 10px; 
            margin: 20px 0 10px 0; 
            display: block; 
        }

        .info-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 15px; 
            backdrop-filter: blur(12px);
        }

        .info-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            font-size: 12px;
        }
        .info-label { color: var(--text-dim); text-transform: uppercase; font-weight: 800; }
        .info-value { color: var(--accent); font-weight: 700; }

        /* --- FIXED BOTTOM PLAYER --- */
        .bottom-player { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid var(--accent); 
            padding: 15px 25px 30px; 
            z-index: 1000; 
        }
        .bar-bg { height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 15px; cursor: pointer; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 10px var(--accent); }
        .controls { display: flex; justify-content: space-around; align-items: center; }
        .c-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .play-main { width: 60px; height: 60px; background: var(--accent); color: black; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 25px; box-shadow: 0 0 20px var(--accent-glow); cursor: pointer; }

        .open-video-btn {
            background: rgba(0, 242, 255, 0.1); 
            border: 1px solid var(--accent); 
            color: var(--accent); 
            padding: 8px 12px; 
            border-radius: 10px; 
            font-size: 10px; 
            font-weight: 900; 
            cursor: pointer;
        }

        .close-panel-btn {
            background: var(--accent); color: black; width: 100%;
            padding: 15px; border: none; border-radius: 20px;
            font-weight: 800; margin-top: 20px; cursor: pointer;
        }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(15px); }
        .modal-open { display: flex !important; }
        .auth-input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; margin-bottom: 15px; outline: none; }
        .primary-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 10px; z-index: 9999; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="app-container">
    <header>
        <div class="brand">MI <span style="color:white">PLAYER</span></div>
        <div class="header-icons">
            <i class="fas fa-list-ul" onclick="togglePlaylist()"></i>
            <i class="fas fa-cog" onclick="togglePanel(true)"></i> </div>
    </header>

    <div class="visual-box">
        <canvas id="canvas-v"></canvas>
        <div class="art-circle">
            <i class="fas fa-headphones text-4xl opacity-20" id="art-icon"></i>
            <img id="track-art-img" src="">
        </div>
    </div>

    <div class="track-info" style="text-align: center; margin-bottom: 20px;">
        <h2 class="track-title" id="title" style="font-size: 22px; font-weight: 900;">Next-Gen Player</h2>
        <p class="track-artist" id="artist" style="color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 2px;">System Ready</p>
    </div>

    <div class="content-area">
        <span class="section-tag">Library Controls</span>
        <label class="block p-6 border-2 border-dashed border-accent/30 rounded-[24px] text-center mb-6 cursor-pointer">
            <i class="fas fa-folder-plus text-accent text-xl mb-2"></i>
            <p class="text-[10px] font-black uppercase tracking-widest text-accent">Import Music Folder</p>
            <input type="file" id="dir-picker" webkitdirectory directory multiple style="display:none">
        </label>

        <div id="list-container" class="space-y-2">
            <p class="text-center text-xs text-slate-500 py-4 italic">Playlist is empty...</p>
        </div>
    </div>
</div>

<div class="bottom-player">
    <div class="flex justify-between text-[10px] font-mono text-accent mb-1" style="display:flex; justify-content: space-between; margin-bottom: 5px;">
        <span id="current-time">00:00</span>
        <span id="total-duration">00:00</span>
    </div>
    <div class="bar-bg" id="seek-bar" onclick="engine.seek(event)">
        <div class="bar-fill" id="fill"></div>
    </div>
    <div class="controls">
        <button class="c-btn" onclick="engine.prev()"><i class="fas fa-step-backward"></i></button>
        <div class="play-main" id="play-btn" onclick="engine.toggle()"><i class="fas fa-play"></i></div>
        <button class="c-btn" onclick="engine.next()"><i class="fas fa-step-forward"></i></button>
        <button class="open-video-btn" onclick="togglePanel(true)">OPEN VIDEO</button>
    </div>
</div>

<div class="overlay" id="overlay" onclick="togglePanel(false)"></div>
<div class="system-panel" id="panel">
    <div class="panel-video-box">
        <video id="pVideo" loop muted playsinline>
            <source src="your-video.mp4" type="video/mp4">
        </video>
    </div>
    <h3 style="font-style: italic; letter-spacing: 3px; margin-bottom: 20px; font-size: 16px;">SYSTEM INFO</h3>
    <div class="info-row"><span class="info-label">POWER STATUS</span><span class="info-value" id="bat-val">--%</span></div>
    <div class="info-row"><span class="info-label">SOFTWARE</span><span class="info-value">v3.5.2 Ultra</span></div>
    <div class="info-row"><span class="info-label">DEVELOPER</span><span class="info-value">Kaushal Ji</span></div>
    <div class="info-row"><span class="info-label">USER</span><span class="info-value" id="display-user">Guest</span></div>
    <button class="close-panel-btn" onclick="togglePanel(false)">CLOSE PANEL</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDQ0Y8M9OGSInOlUltuysgmKOYGKX8dQvg", authDomain: "calculator-by-kaushalji.firebaseapp.com", databaseURL: "https://calculator-by-kaushalji-default-rtdb.firebaseio.com", projectId: "calculator-by-kaushalji", storageBucket: "calculator-by-kaushalji.firebasestorage.app", appId: "1:156130281294:web:73b80a5f344daeabdd001f" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    function showToast(msg, color="#00f2ff") {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.background = color; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function togglePanel(show) {
        const panel = document.getElementById('panel');
        const overlay = document.getElementById('overlay');
        const video = document.getElementById('pVideo');
        if (show) {
            panel.style.display = 'block';
            overlay.style.display = 'block';
            video.play().catch(() => {});
        } else {
            panel.style.display = 'none';
            overlay.style.display = 'none';
            video.pause();
        }
    }

    function togglePlaylist() { window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); }

    // --- CORE MUSIC ENGINE ---
    const engine = {
        audio: new Audio(), playlist: [], index: 0, ctx: null, analyser: null,
        init: function() { 
            this.listeners(); 
            this.loadLocalData();
            if (navigator.getBattery) navigator.getBattery().then(b => {
                const up = () => document.getElementById('bat-val').innerText = Math.round(b.level * 100) + "%";
                up(); b.onlevelchange = up;
            });
        },
        listeners: function() {
            this.audio.ontimeupdate = () => {
                const cur = this.audio.currentTime; const dur = this.audio.duration;
                document.getElementById('fill').style.width = (cur / dur * 100 || 0) + "%";
                document.getElementById('current-time').innerText = this.formatTime(cur);
                if(!isNaN(dur)) document.getElementById('total-duration').innerText = this.formatTime(dur);
            };
            this.audio.onended = () => this.next();
            document.getElementById('dir-picker').onchange = (e) => this.handleFiles(e.target.files);
        },
        formatTime: s => {
            let m = Math.floor(s/60); let sec = Math.floor(s%60);
            return `${m < 10 ? '0'+m : m}:${sec < 10 ? '0'+sec : sec}`;
        },
        handleFiles: async function(files) {
            const db = await this.getDB(); const tx = db.transaction("songs", "readwrite");
            const store = tx.objectStore("songs");
            Array.from(files).filter(f => f.type.startsWith('audio/')).forEach(f => store.add({ name: f.name, data: f }));
            tx.oncomplete = () => { showToast("Library Updated!"); this.loadLocalData(); };
        },
        loadLocalData: async function() {
            const db = await this.getDB();
            db.transaction("songs").objectStore("songs").getAll().onsuccess = (e) => {
                this.playlist = e.target.result; this.renderPlaylist();
                if(this.playlist.length > 0 && !this.audio.src) this.loadTrack(0, false);
            };
        },
        renderPlaylist: function() {
            const container = document.getElementById('list-container');
            if(this.playlist.length === 0) return;
            container.innerHTML = this.playlist.map((s, i) => `
                <div class="info-card flex items-center gap-4 p-3 ${i === this.index ? 'border-accent' : ''}" onclick="engine.loadTrack(${i})" style="display:flex; align-items:center; gap:15px; margin-bottom:10px; cursor:pointer">
                    <div class="w-8 h-8 rounded bg-accent/10 flex items-center justify-center text-accent" style="width:35px; height:35px; background:rgba(0,242,255,0.1); border-radius:8px; display:flex; align-items:center; justify-content:center"><i class="fas fa-play text-[10px]"></i></div>
                    <p style="font-size:12px; font-weight:bold; margin:0; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${s.name.replace(/\.[^/.]+$/, "")}</p>
                </div>
            `).join('');
        },
        loadTrack: function(i, play = true) {
            this.index = i; const track = this.playlist[i];
            if(this.audio.src) URL.revokeObjectURL(this.audio.src);
            this.audio.src = URL.createObjectURL(track.data);
            document.getElementById('title').innerText = track.name.replace(/\.[^/.]+$/, "");
            this.renderPlaylist(); if(play) this.play();
        },
        toggle: function() { 
            if(this.playlist.length === 0) return showToast("No Music Found!", "#ff4757");
            this.audio.paused ? this.play() : this.pause(); 
        },
        play: function() { 
            this.audio.play(); 
            document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>'; 
            this.startVisuals();
        },
        pause: function() { this.audio.pause(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>'; },
        next: function() { this.index = (this.index + 1) % this.playlist.length; this.loadTrack(this.index); },
        prev: function() { this.index = (this.index - 1 + this.playlist.length) % this.playlist.length; this.loadTrack(this.index); },
        seek: function(e) { const b = document.getElementById('seek-bar'); this.audio.currentTime = (e.offsetX / b.offsetWidth) * this.audio.duration; },
        getDB: () => new Promise(res => {
            const r = indexedDB.open("MI_PRO_DB", 1);
            r.onupgradeneeded = e => e.target.result.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
            r.onsuccess = () => res(r.result);
        }),
        startVisuals: function() {
            if(this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.analyser = this.ctx.createAnalyser();
            const src = this.ctx.createMediaElementSource(this.audio);
            src.connect(this.analyser); this.analyser.connect(this.ctx.destination);
            const canvas = document.getElementById('canvas-v'); const c = canvas.getContext('2d');
            canvas.width = 300; canvas.height = 300;
            const draw = () => {
                requestAnimationFrame(draw); const fbc = new Uint8Array(this.analyser.frequencyBinCount);
                this.analyser.getByteFrequencyData(fbc); c.clearRect(0,0,300,300);
                for(let i=0; i<60; i++) {
                    const h = fbc[i] * 0.4; c.strokeStyle = '#00f2ff'; c.lineWidth = 2; c.beginPath();
                    c.moveTo(150+Math.cos(i*0.1)*80, 150+Math.sin(i*0.1)*80);
                    c.lineTo(150+Math.cos(i*0.1)*(80+h), 150+Math.sin(i*0.1)*(80+h)); c.stroke();
                }
            }; draw();
        }
    };

    engine.init();
</script>
        <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            // Background Sync Register karna
            if ('sync' in reg) {
                window.addEventListener('online', () => {
                    reg.sync.register('check-for-updates');
                    console.log("Net wapas aaya! Update checking in background...");
                });
            }
        });

        // Agar naya version mil jaye toh user ko bataye bina refresh kar dena
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log("Naya Update mil gaya! App refresh ho rahi hai...");
            window.location.reload();
        });
    }
        </script>
</body>
</html>
