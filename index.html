<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MI PLAYER PRO | Next-Gen UI</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { 
            --accent: #00f2ff; 
            --accent-glow: rgba(0, 242, 255, 0.5); 
            --bg: #000000; 
            --surface: rgba(30, 41, 59, 0.7); 
            --card-bg: rgba(15, 23, 42, 0.6);
            --text-main: #ffffff; 
            --text-dim: #94a3b8; 
        }

        /* --- GLOBAL & SCROLLABLE BODY --- */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0; 
            overflow-x: hidden; 
            overflow-y: auto; /* Scrollable Enabled */
            min-height: 100vh;
        }

        .app-container { 
            width: 100%; 
            max-width: 450px; 
            margin: 0 auto; 
            position: relative; 
            min-height: 100vh;
            padding-bottom: 120px; /* Space for Fixed Player */
            background: radial-gradient(circle at top right, #0f172a, #000000);
        }

        /* --- DASHBOARD STYLE HEADER --- */
        header { 
            padding: 25px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .brand { font-weight: 900; letter-spacing: 2px; font-size: 18px; color: var(--accent); italic; }
        .user-trigger { width: 40px; height: 40px; border-radius: 12px; background: var(--surface); border: 1px solid var(--accent); overflow: hidden; cursor: pointer; }

        /* --- VISUALIZER SECTION --- */
        .visual-box { 
            height: 350px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            position: relative; 
        }
        #canvas-v { width: 300px; height: 300px; filter: drop-shadow(0 0 20px var(--accent-glow)); }
        .art-circle { 
            position: absolute; 
            width: 140px; 
            height: 140px; 
            background: #1e293b; 
            border-radius: 50%; 
            border: 4px solid var(--accent); 
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }
        .art-circle img { width: 100%; height: 100%; object-fit: cover; display: none; }

        /* --- DATA CARDS (DASHBOARD STYLE) --- */
        .content-area { padding: 20px; }
        .section-tag { 
            color: var(--accent); 
            font-size: 10px; 
            font-weight: 900; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            border-left: 3px solid var(--accent); 
            padding-left: 10px; 
            margin: 20px 0 10px 0; 
            display: block; 
        }

        .info-card { 
            background: var(--card-bg); 
            border: 1px solid rgba(255,255,255,0.08); 
            border-radius: 24px; 
            padding: 20px; 
            margin-bottom: 15px; 
            backdrop-filter: blur(12px);
        }

        .info-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 10px 0; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
        }
        .info-label { color: var(--text-dim); font-size: 11px; text-transform: uppercase; font-weight: 800; }
        .info-value { color: var(--accent); font-size: 13px; font-weight: 700; }

        /* --- TRACK META --- */
        .track-info { text-align: center; margin-bottom: 20px; }
        .track-title { font-size: 22px; font-weight: 900; color: white; margin-bottom: 5px; }
        .track-artist { color: var(--accent); font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }

        /* --- FIXED BOTTOM PLAYER --- */
        .bottom-player { 
            position: fixed; 
            bottom: 0; 
            left: 0; 
            width: 100%; 
            background: rgba(15, 23, 42, 0.95); 
            backdrop-filter: blur(20px); 
            border-top: 1px solid var(--accent); 
            padding: 15px 25px 30px; 
            z-index: 1000; 
        }
        .bar-bg { height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; margin-bottom: 15px; cursor: pointer; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 10px var(--accent); }
        .controls { display: flex; justify-content: space-around; align-items: center; }
        .c-btn { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .play-main { width: 60px; height: 60px; background: var(--accent); color: black; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 25px; box-shadow: 0 0 20px var(--accent-glow); }

        /* --- MODALS --- */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 2000; display: none; flex-direction: column; padding: 40px 25px; backdrop-filter: blur(15px); }
        .modal-open { display: flex !important; }
        .auth-input { width: 100%; padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; color: white; margin-bottom: 15px; outline: none; }
        .primary-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        /* --- TOAST --- */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 25px; border-radius: 10px; z-index: 9999; display: none; font-weight: bold; }
    </style>
</head>
<body>

<div id="toast"></div>

<div class="app-container">
    <header>
        <div class="user-trigger" onclick="toggleAuth()">
            <img id="user-photo" src="" style="width: 100%; height: 100%; display: none;">
            <div id="user-placeholder" style="height: 100%; display: flex; align-items: center; justify-content: center;"><i class="fas fa-user text-accent"></i></div>
        </div>
        <div class="brand">MI <span style="color:white">PLAYER</span></div>
        <div style="display: flex; gap: 15px;">
            <i class="fas fa-list-ul text-accent" onclick="togglePlaylist()"></i>
            <i class="fas fa-cog text-accent" onclick="toggleMenu()"></i>
        </div>
    </header>

    <div class="visual-box">
        <canvas id="canvas-v"></canvas>
        <div class="art-circle">
            <i class="fas fa-headphones text-4xl opacity-20" id="art-icon"></i>
            <img id="track-art-img" src="">
        </div>
    </div>

    <div class="track-info">
        <h2 class="track-title" id="title">Next-Gen Player</h2>
        <p class="track-artist" id="artist">System Ready</p>
    </div>

    <div class="content-area">
        <span class="section-tag">System & App Info</span>
        <div class="info-card">
            <div class="info-row"><span class="info-label">Version</span><span class="info-value">v3.5.2 Pro</span></div>
            <div class="info-row"><span class="info-label">Engine</span><span class="info-value">AudioCore-X</span></div>
            <div class="info-row"><span class="info-label">Developer</span><span class="info-value">Kaushal Ji</span></div>
            <div class="info-row"><span class="info-label">Power Status</span><span class="info-value" id="battery-status">Detecting...</span></div>
        </div>

        <span class="section-tag">User Identity</span>
        <div class="info-card">
            <div class="info-row"><span class="info-label">Profile Name</span><span class="info-value" id="display-user">Guest User</span></div>
            <div class="info-row"><span class="info-label">Status</span><span class="info-value text-emerald-400">Authorized</span></div>
            <div class="info-row" style="border:none; margin-top: 10px;">
                <button onclick="toggleAuth()" class="text-[10px] font-black uppercase text-accent border border-accent/30 px-4 py-2 rounded-lg">Switch Account</button>
            </div>
        </div>

        <span class="section-tag">Local Library</span>
        <div id="list-container" class="space-y-2">
            <p class="text-center text-xs text-slate-500 py-4 italic">No songs imported yet...</p>
        </div>

        <label class="block p-8 border-2 border-dashed border-accent/30 rounded-[30px] text-center mt-6 cursor-pointer active:scale-95 transition-all">
            <i class="fas fa-folder-plus text-accent text-2xl mb-2"></i>
            <p class="text-[10px] font-black uppercase tracking-widest text-accent">Import Folder</p>
            <input type="file" id="dir-picker" webkitdirectory directory multiple style="display:none">
        </label>
    </div>
</div>

<div class="bottom-player">
    <div class="flex justify-between text-[10px] font-mono text-accent mb-1">
        <span id="current-time">00:00</span>
        <span id="total-duration">00:00</span>
    </div>
    <div class="bar-bg" id="seek-bar" onclick="engine.seek(event)">
        <div class="bar-fill" id="fill"></div>
    </div>
    <div class="controls">
        <button class="c-btn" onclick="engine.prev()"><i class="fas fa-step-backward"></i></button>
        <button class="play-main" id="play-btn" onclick="engine.toggle()"><i class="fas fa-play"></i></button>
        <button class="c-btn" onclick="engine.next()"><i class="fas fa-step-forward"></i></button>
    </div>
</div>

<div id="auth-panel" class="modal">
    <h2 class="text-2xl font-black italic mb-8 text-accent">USER GATEWAY</h2>
    <div id="auth-form">
        <input type="email" id="user-email" class="auth-input" placeholder="Email Address">
        <input type="password" id="user-pass" class="auth-input" placeholder="Password">
        <button class="primary-btn" onclick="handleAuth()">Sign In</button>
    </div>
    <button onclick="toggleAuth()" class="mt-10 text-xs font-bold text-slate-500 uppercase tracking-widest">Close Panel</button>
</div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyDQ0Y8M9OGSInOlUltuysgmKOYGKX8dQvg", authDomain: "calculator-by-kaushalji.firebaseapp.com", databaseURL: "https://calculator-by-kaushalji-default-rtdb.firebaseio.com", projectId: "calculator-by-kaushalji", storageBucket: "calculator-by-kaushalji.firebasestorage.app", appId: "1:156130281294:web:73b80a5f344daeabdd001f" };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db_ref = firebase.database();

    function showToast(msg, color="#00f2ff") {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.background = color; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }

    function toggleAuth() { document.getElementById('auth-panel').classList.toggle('modal-open'); }
    function togglePlaylist() { window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'}); }

    // --- CORE MUSIC ENGINE ---
    const engine = {
        audio: new Audio(), playlist: [], index: 0, ctx: null, analyser: null,
        init: function() { 
            this.listeners(); 
            this.loadLocalData();
            if (navigator.getBattery) navigator.getBattery().then(b => {
                document.getElementById('battery-status').innerText = Math.round(b.level * 100) + "%";
            });
        },
        listeners: function() {
            this.audio.ontimeupdate = () => {
                const cur = this.audio.currentTime; const dur = this.audio.duration;
                document.getElementById('fill').style.width = (cur / dur * 100 || 0) + "%";
                document.getElementById('current-time').innerText = this.formatTime(cur);
                if(!isNaN(dur)) document.getElementById('total-duration').innerText = this.formatTime(dur);
            };
            this.audio.onended = () => this.next();
            document.getElementById('dir-picker').onchange = (e) => this.handleFiles(e.target.files);
        },
        formatTime: s => {
            let m = Math.floor(s/60); let sec = Math.floor(s%60);
            return `${m < 10 ? '0'+m : m}:${sec < 10 ? '0'+sec : sec}`;
        },
        handleFiles: async function(files) {
            const db = await this.getDB(); const tx = db.transaction("songs", "readwrite");
            const store = tx.objectStore("songs");
            Array.from(files).filter(f => f.type.startsWith('audio/')).forEach(f => store.add({ name: f.name, data: f }));
            tx.oncomplete = () => { showToast("Library Updated!"); this.loadLocalData(); };
        },
        loadLocalData: async function() {
            const db = await this.getDB();
            db.transaction("songs").objectStore("songs").getAll().onsuccess = (e) => {
                this.playlist = e.target.result; this.renderPlaylist();
                if(this.playlist.length > 0 && !this.audio.src) this.loadTrack(0, false);
            };
        },
        renderPlaylist: function() {
            const container = document.getElementById('list-container');
            if(this.playlist.length === 0) return;
            container.innerHTML = this.playlist.map((s, i) => `
                <div class="info-card flex items-center gap-4 p-3 ${i === this.index ? 'border-accent' : ''}" onclick="engine.loadTrack(${i})">
                    <div class="w-8 h-8 rounded bg-accent/10 flex items-center justify-center text-accent"><i class="fas fa-play text-[10px]"></i></div>
                    <div class="flex-1 overflow-hidden">
                        <p class="text-xs font-bold truncate">${s.name.replace(/\.[^/.]+$/, "")}</p>
                    </div>
                </div>
            `).join('');
        },
        loadTrack: function(i, play = true) {
            this.index = i; const track = this.playlist[i];
            if(this.audio.src) URL.revokeObjectURL(this.audio.src);
            this.audio.src = URL.createObjectURL(track.data);
            document.getElementById('title').innerText = track.name.replace(/\.[^/.]+$/, "");
            this.renderPlaylist(); if(play) this.play();
        },
        toggle: function() { 
            if(this.playlist.length === 0) return showToast("No Music Found!", "#ff4757");
            this.audio.paused ? this.play() : this.pause(); 
        },
        play: function() { 
            this.audio.play(); 
            document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>'; 
            this.startVisuals();
        },
        pause: function() { this.audio.pause(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>'; },
        next: function() { this.index = (this.index + 1) % this.playlist.length; this.loadTrack(this.index); },
        prev: function() { this.index = (this.index - 1 + this.playlist.length) % this.playlist.length; this.loadTrack(this.index); },
        seek: function(e) { const b = document.getElementById('seek-bar'); this.audio.currentTime = (e.offsetX / b.offsetWidth) * this.audio.duration; },
        getDB: () => new Promise(res => {
            const r = indexedDB.open("MI_PRO_DB", 1);
            r.onupgradeneeded = e => e.target.result.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
            r.onsuccess = () => res(r.result);
        }),
        startVisuals: function() {
            if(this.ctx) return;
            this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            this.analyser = this.ctx.createAnalyser();
            const src = this.ctx.createMediaElementSource(this.audio);
            src.connect(this.analyser); this.analyser.connect(this.ctx.destination);
            const canvas = document.getElementById('canvas-v'); const c = canvas.getContext('2d');
            canvas.width = 300; canvas.height = 300;
            const draw = () => {
                requestAnimationFrame(draw); const fbc = new Uint8Array(this.analyser.frequencyBinCount);
                this.analyser.getByteFrequencyData(fbc); c.clearRect(0,0,300,300);
                for(let i=0; i<60; i++) {
                    const h = fbc[i] * 0.4; c.strokeStyle = '#00f2ff'; c.lineWidth = 2; c.beginPath();
                    c.moveTo(150+Math.cos(i*0.1)*80, 150+Math.sin(i*0.1)*80);
                    c.lineTo(150+Math.cos(i*0.1)*(80+h), 150+Math.sin(i*0.1)*(80+h)); c.stroke();
                }
            }; draw();
        }
    };

    auth.onAuthStateChanged(user => {
        if(user) {
            db_ref.ref(`users/${user.uid}`).on('value', s => {
                const data = s.val();
                if(data) {
                    document.getElementById('display-user').innerText = data.username;
                    if(data.photoURL) {
                        document.getElementById('user-photo').src = data.photoURL;
                        document.getElementById('user-photo').style.display = 'block';
                        document.getElementById('user-placeholder').style.display = 'none';
                        document.getElementById('track-art-img').src = data.photoURL;
                        document.getElementById('track-art-img').style.display = 'block';
                        document.getElementById('art-icon').style.display = 'none';
                    }
                }
            });
        }
    });

    async function handleAuth() {
        const e = document.getElementById('user-email').value;
        const p = document.getElementById('user-pass').value;
        try {
            await auth.signInWithEmailAndPassword(e, p);
            showToast("Authenticated!"); toggleAuth();
        } catch(err) { showToast(err.message, "#ff4757"); }
    }

    engine.init();
</script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            // Background Sync Register karna
            if ('sync' in reg) {
                window.addEventListener('online', () => {
                    reg.sync.register('check-for-updates');
                    console.log("Net wapas aaya! Update checking in background...");
                });
            }
        });

        // Agar naya version mil jaye toh user ko bataye bina refresh kar dena
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log("Naya Update mil gaya! App refresh ho rahi hai...");
            window.location.reload();
        });
    }
</script>
</body>
</html>
