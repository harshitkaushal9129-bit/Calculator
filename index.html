    <style>
        :root { --accent: #00f2ff; --accent-glow: rgba(0, 242, 255, 0.5); --bg: #08080a; --surface: rgba(255, 255, 255, 0.05); --text-main: #ffffff; --text-dim: #a0a0a0; --error: #ff4757; --success: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        /* Sidebar Links (Background Area) */
        .side-links { position: fixed; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 1; padding: 20px; }
        .side-links.left { left: 20px; }
        .side-links.right { right: 20px; }
        .nav-icon-link { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.4; transition: 0.3s; }
        .nav-icon-link:hover { opacity: 1; transform: scale(1.1); }
        .nav-icon-link span { font-size: 24px; }
        .nav-icon-link label { font-size: 10px; color: var(--accent); font-weight: bold; cursor: pointer; }

        .app-container { width: 100%; max-width: 420px; height: 100%; background: radial-gradient(circle at top right, #1a1a2e, #08080a); position: relative; display: flex; flex-direction: column; overflow: hidden; border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); z-index: 10; box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        /* Header & Panels */
        header { padding: 50px 25px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .brand { font-weight: 800; letter-spacing: 4px; font-size: 14px; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 10px var(--accent-glow); }
        #user-photo-box { width: 38px; height: 38px; border-radius: 50%; background: var(--surface); border: 2px solid var(--accent); overflow: hidden; display: none; cursor: pointer; box-shadow: 0 0 10px var(--accent-glow); }
        #user-photo { width: 100%; height: 100%; object-fit: cover; }
        
        #playlist-panel, #auth-panel, #side-panel { position: absolute; top: 0; width: 100%; height: 100%; background: rgba(8, 8, 10, 0.98); backdrop-filter: blur(25px); z-index: 250; transition: 0.5s cubic-bezier(0.85, 0, 0.15, 1); padding: 60px 20px; }
        #playlist-panel { right: -100%; width: 85%; border-left: 1px solid var(--accent); }
        #side-panel { right: -100%; width: 85%; border-left: 1px solid var(--accent); z-index: 300; }
        #auth-panel { left: -100%; z-index: 400; }
        
        .playlist-open, .panel-open { right: 0 !important; }
        .auth-open { left: 0 !important; }

        /* Track Info & Visualizer */
        .visualizer-orbit { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        #canvas-v { width: 340px; height: 340px; filter: drop-shadow(0 0 25px var(--accent-glow)); }
        .album-art-proxy { position: absolute; width: 170px; height: 170px; background: var(--surface); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 3px solid rgba(255, 255, 255, 0.05); overflow: hidden; }
        .album-art-proxy img { width: 100%; height: 100%; object-fit: cover; display: none; }
        .track-meta { text-align: center; padding: 20px; }
        .track-title { font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        
        /* Dashboard Info */
        .app-info-container { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; margin: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .info-row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .info-value { color: var(--accent); font-weight: bold; }

        /* Controls */
        .player-core { padding: 20px 30px 40px; background: rgba(255, 255, 255, 0.03); border-radius: 45px 45px 0 0; }
        .bar-bg { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; position: relative; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 15px var(--accent); }
        .main-cmds { display: flex; justify-content: space-around; align-items: center; margin-top: 25px;}
        .btn-icon { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .play-trigger { width: 70px; height: 70px; border-radius: 50%; background: var(--accent); color: #000; display: flex; justify-content: center; align-items: center; font-size: 28px; }

        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 15px; border-radius: 12px; z-index: 9999; transition: 0.5s; width: 80%; text-align: center; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .toast-show { top: 30px !important; }

        @media (max-width: 800px) { .side-links { display: none; } }

<script>
const firebaseConfig = { apiKey: "AIzaSyDQ0Y8M9OGSInOlUltuysgmKOYGKX8dQvg", authDomain: "calculator-by-kaushalji.firebaseapp.com", databaseURL: "https://calculator-by-kaushalji-default-rtdb.firebaseio.com", projectId: "calculator-by-kaushalji", storageBucket: "calculator-by-kaushalji.firebasestorage.app", messagingSenderId: "156130281294", appId: "1:156130281294:web:73b80a5f344daeabdd001f" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(); const db_ref = firebase.database();

function showToast(msg, type) {
    let t = document.getElementById('toast') || document.createElement('div');
    t.id = 'toast'; document.body.appendChild(t);
    t.innerText = msg; t.className = `toast-show`;
    setTimeout(() => t.classList.remove('toast-show'), 3000);
}

function toggleAuth() { document.getElementById('auth-panel').classList.toggle('auth-open'); }
function toggleMenu() { document.getElementById('side-panel').classList.toggle('panel-open'); }
function togglePlaylist() { document.getElementById('playlist-panel').classList.toggle('playlist-open'); }

const engine = {
    audio: new Audio(), playlist: [], index: 0, ctx: null, analyser: null,
    init: function() {
        this.audio.ontimeupdate = () => {
            const cur = this.audio.currentTime; const dur = this.audio.duration;
            document.getElementById('fill').style.width = (cur/dur*100) + "%";
            document.getElementById('current-time').innerText = this.formatTime(cur);
            if(!isNaN(dur)) document.getElementById('total-duration').innerText = this.formatTime(dur);
        };
        this.audio.onended = () => this.next();
        document.getElementById('dir-picker').onchange = (e) => this.handleFiles(e.target.files);
        this.loadLocalData();
    },
    formatTime: (s) => { let m=Math.floor(s/60), r=Math.floor(s%60); return `${m<10?'0'+m:m}:${r<10?'0'+r:r}`; },
    handleFiles: async function(fs) {
        const db = await this.getDB(); const tx = db.transaction("songs", "readwrite");
        Array.from(fs).filter(f => f.type.startsWith('audio/')).forEach(f => tx.objectStore("songs").add({ name: f.name, data: f }));
        tx.oncomplete = () => { showToast("Library Updated!", "success"); this.loadLocalData(); };
    },
    loadLocalData: async function() {
        const db = await this.getDB();
        db.transaction("songs").objectStore("songs").getAll().onsuccess = (e) => {
            this.playlist = e.target.result; this.render();
            if(this.playlist.length > 0 && !this.audio.src) this.loadTrack(0, false);
        };
    },
    render: function() {
        const c = document.getElementById('list-container'); c.innerHTML = "";
        this.playlist.forEach((s, i) => {
            const d = document.createElement('div');
            d.style.padding = "12px"; d.style.background = "rgba(255,255,255,0.03)"; d.style.marginBottom = "5px";
            d.innerText = s.name; d.onclick = () => this.loadTrack(i);
            c.appendChild(d);
        });
    },
    loadTrack: function(i, p=true) {
        this.index = i; const t = this.playlist[i];
        this.audio.src = URL.createObjectURL(t.data);
        document.getElementById('title').innerText = t.name.split('.')[0];
        if(p) this.play();
    },
    toggle: function() { this.audio.paused ? this.play() : this.pause(); },
    play: function() { this.audio.play(); document.getElementById('play-btn').innerText = "⏸"; this.startVis(); },
    pause: function() { this.audio.pause(); document.getElementById('play-btn').innerText = "▶"; },
    next: function() { this.index = (this.index+1)%this.playlist.length; this.loadTrack(this.index); },
    prev: function() { this.index = (this.index-1+this.playlist.length)%this.playlist.length; this.loadTrack(this.index); },
    seek: function(e) { this.audio.currentTime = (e.offsetX/document.getElementById('seek-bar').offsetWidth)*this.audio.duration; },
    getDB: () => new Promise(res => {
        const r = indexedDB.open("MI_PRO_DB", 1);
        r.onupgradeneeded = (e) => e.target.result.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
        r.onsuccess = () => res(r.result);
    }),
    startVis: function() {
        if(this.ctx) return;
        this.ctx = new AudioContext(); this.analyser = this.ctx.createAnalyser();
        const s = this.ctx.createMediaElementSource(this.audio);
        s.connect(this.analyser); this.analyser.connect(this.ctx.destination);
        const cv = document.getElementById('canvas-v'); const c = cv.getContext('2d');
        const draw = () => {
            requestAnimationFrame(draw); const f = new Uint8Array(this.analyser.frequencyBinCount);
            this.analyser.getByteFrequencyData(f); c.clearRect(0,0,340,340);
            for(let i=0; i<80; i++) {
                const h = f[i]*0.4; c.strokeStyle = '#00f2ff'; c.lineWidth = 2;
                c.beginPath(); c.moveTo(170+Math.cos(i*0.08)*95, 170+Math.sin(i*0.08)*95);
                c.lineTo(170+Math.cos(i*0.08)*(95+h), 170+Math.sin(i*0.08)*(95+h)); c.stroke();
            }
        }; draw();
    }
};

auth.onAuthStateChanged(user => {
    const photoBox = document.getElementById('user-photo-box');
    const authIcon = document.getElementById('auth-icon');
    const trackArt = document.getElementById('track-art-img');
    const headphone = document.getElementById('headphone-icon');
    if(user) {
        db_ref.ref(`users/${user.uid}`).on('value', s => {
            const d = s.val(); if(d) {
                document.getElementById('display-user').innerText = "Hello, " + d.username;
                document.getElementById('user-photo').src = d.photoURL;
                trackArt.src = d.photoURL; trackArt.style.display = 'block';
                photoBox.style.display = 'block'; authIcon.style.display = 'none';
                headphone.style.display = 'none';
            }
        });
        document.getElementById('auth-content').style.display = 'none';
        document.getElementById('user-profile').style.display = 'block';
    } else {
        photoBox.style.display = 'none'; authIcon.style.display = 'block';
        trackArt.style.display = 'none'; headphone.style.display = 'block';
    }
});

function logout() { auth.signOut(); location.reload(); }
function clearData() { indexedDB.deleteDatabase("MI_PRO_DB"); location.reload(); }
engine.init();

    document.onkeydown = function(e) {
        if(e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
    };
})();
</script>

</script>
