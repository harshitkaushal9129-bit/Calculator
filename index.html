<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MI PLAYER PRO | Next-Gen</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
    :root { 
        --accent: #00f2ff; --accent-glow: rgba(0, 242, 255, 0.5); 
        --bg: #08080a; --surface: rgba(255, 255, 255, 0.05); 
        --text-main: #ffffff; --text-dim: #a0a0a0; 
        --error: #ff4757; --success: #00ff88; 
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
    body { background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; display: flex; justify-content: center; align-items: center; }

    /* SIDE LINKS */
    .side-links { position: fixed; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; padding: 15px; background: rgba(8,8,10,0.6); backdrop-filter: blur(10px); border-radius: 20px; }
    .side-links.left { left: 10px; }
    .side-links.right { right: 10px; }
    .nav-icon-link { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.6; transition: 0.3s; }
    .nav-icon-link:hover { opacity: 1; transform: scale(1.1); }
    .nav-icon-link span { font-size: 22px; }
    .nav-icon-link label { font-size: 8px; color: var(--accent); font-weight: bold; text-transform: uppercase; text-align: center; cursor: pointer; }

    /* APP CONTAINER */
    .app-container { width: 100%; max-width: 420px; height: 100%; background: radial-gradient(circle at top right, #1a1a2e, #08080a); position: relative; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 0 80px rgba(0,0,0,0.8); z-index: 10; }

    header { padding: 50px 25px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
    .brand { font-weight: 800; letter-spacing: 4px; font-size: 14px; color: var(--accent); text-shadow: 0 0 10px var(--accent-glow); }
    #user-photo-box { width: 38px; height: 38px; border-radius: 50%; border: 2px solid var(--accent); overflow: hidden; cursor: pointer; display: none; }
    #user-photo { width: 100%; height: 100%; object-fit: cover; }

    /* PANELS (Playlist, Auth, Settings) */
    .side-panel { position: absolute; top: 0; width: 85%; height: 100%; background: rgba(8, 8, 10, 0.98); backdrop-filter: blur(25px); z-index: 250; transition: 0.5s cubic-bezier(0.85, 0, 0.15, 1); padding: 60px 20px; border-left: 1px solid var(--accent); right: -100%; }
    .auth-panel { left: -100%; right: auto; width: 100%; border-right: 1px solid var(--accent); border-left: none; }
    .open-right { right: 0 !important; }
    .open-left { left: 0 !important; }

    /* CALCULATOR */
    #calc-modal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9); width: 320px; background: rgba(10, 10, 15, 0.98); backdrop-filter: blur(25px); border: 1px solid var(--accent); border-radius: 25px; z-index: 1000; padding: 20px; display: none; transition: 0.3s; }
    .calc-btn { padding: 15px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; border-radius: 10px; cursor: pointer; font-weight: bold; }
    .calc-btn:hover { background: var(--accent); color: black; }
    #calc-display { width: 100%; background: #000; border: 1px solid var(--accent); color: var(--accent); padding: 15px; font-size: 24px; text-align: right; border-radius: 10px; margin-bottom: 10px; }

    /* PLAYER CORE */
    .visualizer-orbit { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
    #canvas-v { width: 300px; height: 300px; }
    .album-art-proxy { position: absolute; width: 150px; height: 150px; background: var(--surface); border-radius: 50%; overflow: hidden; display: flex; justify-content: center; align-items: center; border: 2px solid var(--accent); }
    .player-core { padding: 30px; background: rgba(255,255,255,0.03); border-radius: 40px 40px 0 0; }
    .bar-bg { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; margin: 15px 0; }
    .bar-fill { height: 100%; background: var(--accent); width: 0%; border-radius: 10px; }

    /* INPUTS & BUTTONS */
    input[type="text"], input[type="email"], input[type="password"], input[type="number"] { width: 100%; padding: 12px; margin-bottom: 10px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); border-radius: 10px; color: white; }
    .auth-btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    .connect-link { display: flex; align-items: center; gap: 10px; text-decoration: none; color: white; background: rgba(255,255,255,0.05); padding: 10px; border-radius: 10px; margin-bottom: 5px; font-size: 13px; }

    #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 10px; z-index: 2000; transition: 0.5s; text-align: center; width: 80%; }
    .toast-show { top: 20px !important; }
    </style>
</head>
<body>

<div id="toast" style="background: var(--accent); color: #000;"></div>

<div class="side-links left">
    <a href="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/" target="_blank" class="nav-icon-link"><span>🏛️</span><label>Portal</label></a>
    <a href="https://harshitkaushal9129-bit.github.io/Pdf-reader/" class="nav-icon-link"><span>📁</span><label>Vault</label></a>
    <a href="https://harshitkaushal9129-bit.github.io/Snt-institute.id-card/" class="nav-icon-link"><span>📇</span><label>ID Gen</label></a>
</div>

<div class="side-links right">
    <div class="nav-icon-link" onclick="toggleCalc()"><span>💻</span><label>Calc</label></div>
    <a href="https://harshitkaushal9129-bit.github.io/neilet-mcqs/" class="nav-icon-link"><span>🛠️</span><label>MCQs</label></a>
</div>

<div class="app-container">
    <header>
        <div id="user-photo-box" onclick="toggleAuth()"><img id="user-photo" src=""></div>
        <div id="auth-icon" onclick="toggleAuth()" style="cursor:pointer; font-size: 24px;">👤</div>
        <div class="brand">MI PRO</div>
        <div style="display:flex; gap:15px;">
            <div onclick="togglePlaylist()" style="cursor:pointer;">🎶</div>
            <div onclick="toggleMenu()" style="cursor:pointer;">☰</div>
        </div>
    </header>

    <div class="visualizer-orbit">
        <canvas id="canvas-v"></canvas>
        <div class="album-art-proxy">
            <img id="track-art-img" style="display:none; width:100%; height:100%; object-fit:cover;">
            <span id="def-icon">🎧</span>
        </div>
    </div>

    <div style="text-align:center; padding:10px;">
        <h3 id="title">MI Player Pro</h3>
        <p id="artist" style="color:var(--accent); font-size:12px;">Welcome Back</p>
    </div>

    <div class="player-core">
        <div style="display:flex; justify-content:space-between; font-size:10px;">
            <span id="current-time">00:00</span>
            <span id="total-duration">00:00</span>
        </div>
        <div class="bar-bg" id="seek-bar" onclick="engine.seek(event)"><div class="bar-fill" id="fill"></div></div>
        <div style="display:flex; justify-content:space-around; align-items:center;">
            <button onclick="engine.prev()" style="background:none; border:none; color:white; font-size:20px;">⏮</button>
            <button id="play-btn" onclick="engine.toggle()" style="width:60px; height:60px; border-radius:50%; background:var(--accent); border:none; font-size:24px;">▶</button>
            <button onclick="engine.next()" style="background:none; border:none; color:white; font-size:20px;">⏭</button>
        </div>
    </div>

    <div id="playlist-panel" class="side-panel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;"><h3>PLAYLIST</h3><span onclick="togglePlaylist()">✕</span></div>
        <div id="list-container"></div>
    </div>

    <div id="auth-panel" class="side-panel auth-panel">
        <div onclick="toggleAuth()" style="margin-bottom:20px; cursor:pointer;">⬅ Back</div>
        <div id="auth-form">
            <h2 id="auth-title">Login</h2>
            <div id="reg-extra" style="display:none;">
                <input type="text" id="user-name" placeholder="Full Name">
                <input type="number" id="user-mobile" placeholder="Mobile Number">
                <input type="file" id="user-image" onchange="previewImg(this)" style="font-size:10px; margin-bottom:10px;">
            </div>
            <input type="email" id="user-email" placeholder="Email">
            <input type="password" id="user-pass" placeholder="Password">
            <button class="auth-btn" onclick="handleAuth()">Submit</button>
            <p onclick="switchAuth()" style="font-size:12px; margin-top:15px; cursor:pointer; text-decoration:underline;">New user? Register</p>
        </div>
        <div id="user-profile" style="display:none; text-align:center;">
            <h3 id="display-name"></h3>
            <p id="display-mobile" style="font-size:12px; color:var(--accent);"></p>
            <button class="auth-btn" onclick="logout()" style="margin-top:20px; background:var(--error);">Logout</button>
        </div>
    </div>

    <div id="side-panel" class="side-panel">
        <div onclick="toggleMenu()" style="margin-bottom:20px; cursor:pointer;">✕ Close</div>
        <a href="https://wa.me/919129191898" class="connect-link"><i class="fab fa-whatsapp"></i> WhatsApp Support</a>
        <label class="connect-link" style="cursor:pointer;"><i class="fas fa-folder-plus"></i> Import Music <input type="file" id="dir-picker" webkitdirectory directory multiple style="display:none"></label>
        <div class="connect-link" onclick="clearData()" style="color:var(--error); cursor:pointer;"><i class="fas fa-trash"></i> Reset App</div>
    </div>
</div>

<div id="calc-modal">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <span style="color:var(--accent); font-size:10px;">CYBER CALC</span>
        <span onclick="toggleCalc()" style="cursor:pointer; color:var(--error);">✕</span>
    </div>
    <input type="text" id="calc-display" readonly>
    <div id="calc-history" style="height:40px; font-size:10px; color:var(--text-dim); text-align:right; overflow-y:auto; margin-bottom:10px;"></div>
    <div id="calc-buttons" style="display:grid; grid-template-columns:repeat(4, 1fr); gap:8px;"></div>
</div>

<script>
const firebaseConfig = { apiKey: "AIzaSyDQ0Y8M9OGSInOlUltuysgmKOYGKX8dQvg", authDomain: "calculator-by-kaushalji.firebaseapp.com", databaseURL: "https://calculator-by-kaushalji-default-rtdb.firebaseio.com", projectId: "calculator-by-kaushalji", storageBucket: "calculator-by-kaushalji.firebasestorage.app", messagingSenderId: "156130281294", appId: "1:156130281294:web:73b80a5f344daeabdd001f" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(); const db = firebase.database();
let currentMode = 'login', userBase64 = "";

function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('toast-show'); setTimeout(()=>t.classList.remove('toast-show'),3000); }
function toggleAuth() { document.getElementById('auth-panel').classList.toggle('open-left'); }
function toggleMenu() { document.getElementById('side-panel').classList.toggle('open-right'); }
function togglePlaylist() { document.getElementById('playlist-panel').classList.toggle('open-right'); }

function switchAuth() {
    currentMode = (currentMode === 'login' ? 'register' : 'login');
    document.getElementById('auth-title').innerText = (currentMode === 'login' ? 'Login' : 'Create Account');
    document.getElementById('reg-extra').style.display = (currentMode === 'login' ? 'none' : 'block');
}

function previewImg(input) {
    if(input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = (e) => userBase64 = e.target.result;
        reader.readAsDataURL(input.files[0]);
    }
}

async function handleAuth() {
    const email = document.getElementById('user-email').value;
    const pass = document.getElementById('user-pass').value;
    if(!email || !pass) return showToast("Fields empty!");
    
    try {
        if(currentMode === 'register') {
            const name = document.getElementById('user-name').value;
            const mob = document.getElementById('user-mobile').value;
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            await db.ref(`users/${res.user.uid}`).set({ name, mobile: mob, photo: userBase64 });
            showToast("Registered!");
        } else {
            await auth.signInWithEmailAndPassword(email, pass);
            showToast("Welcome Back!"); toggleAuth();
        }
    } catch(e) { showToast(e.message); }
}

auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('auth-form').style.display = 'none';
        document.getElementById('user-profile').style.display = 'block';
        db.ref(`users/${user.uid}`).on('value', s => {
            const d = s.val();
            if(d) {
                document.getElementById('display-name').innerText = d.name;
                document.getElementById('display-mobile').innerText = d.mobile;
                if(d.photo) {
                    document.getElementById('user-photo').src = d.photo;
                    document.getElementById('user-photo-box').style.display = 'block';
                    document.getElementById('auth-icon').style.display = 'none';
                    document.getElementById('track-art-img').src = d.photo;
                    document.getElementById('track-art-img').style.display = 'block';
                    document.getElementById('def-icon').style.display = 'none';
                }
            }
        });
    } else {
        document.getElementById('auth-form').style.display = 'block';
        document.getElementById('user-profile').style.display = 'none';
        document.getElementById('user-photo-box').style.display = 'none';
        document.getElementById('auth-icon').style.display = 'block';
    }
});

function logout() { auth.signOut(); showToast("Logged Out"); }

// --- CALCULATOR ---
function toggleCalc() {
    const m = document.getElementById('calc-modal');
    if(m.style.display === 'none' || m.style.display === '') {
        m.style.display = 'block';
        setTimeout(() => m.style.transform = 'translate(-50%, -50%) scale(1)', 10);
    } else {
        m.style.transform = 'translate(-50%, -50%) scale(0.9)';
        setTimeout(() => m.style.display = 'none', 200);
    }
}

const calcKeys = ['C','/','*','DEL','7','8','9','-','4','5','6','+','1','2','3','=','0','.'];
const cDisp = document.getElementById('calc-display');
const cHist = document.getElementById('calc-history');

calcKeys.forEach(k => {
    const b = document.createElement('button'); b.innerText = k; b.className = 'calc-btn';
    if(k === '=') b.style.gridColumn = 'span 2';
    b.onclick = () => {
        if(k === 'C') cDisp.value = '';
        else if(k === 'DEL') cDisp.value = cDisp.value.slice(0,-1);
        else if(k === '=') {
            try {
                let res = eval(cDisp.value);
                cHist.innerHTML += `<div>${cDisp.value} = ${res}</div>`;
                cDisp.value = res;
                cHist.scrollTop = cHist.scrollHeight;
            } catch { cDisp.value = "Error"; }
        } else cDisp.value += k;
    };
    document.getElementById('calc-buttons').appendChild(b);
});

// --- MEDIA ENGINE ---
const engine = {
    audio: new Audio(), playlist: [], index: 0, ctx: null, analyser: null,
    init() {
        this.audio.ontimeupdate = () => {
            const cur = this.audio.currentTime, dur = this.audio.duration;
            document.getElementById('fill').style.width = (cur/dur*100) + "%";
            document.getElementById('current-time').innerText = this.formatTime(cur);
            if(!isNaN(dur)) document.getElementById('total-duration').innerText = this.formatTime(dur);
        };
        document.getElementById('dir-picker').onchange = (e) => this.handleFiles(e.target.files);
        this.loadLocal();
    },
    formatTime: (s) => { let m=Math.floor(s/60), r=Math.floor(s%60); return `${m<10?'0'+m:m}:${r<10?'0'+r:r}`; },
    handleFiles: async function(files) {
        const db = await this.getDB(), tx = db.transaction("songs","readwrite"), s = tx.objectStore("songs");
        Array.from(files).filter(f => f.type.startsWith('audio/')).forEach(f => s.add({name:f.name, data:f}));
        tx.oncomplete = () => this.loadLocal();
    },
    loadLocal: async function() {
        const db = await this.getDB();
        db.transaction("songs").objectStore("songs").getAll().onsuccess = (e) => {
            this.playlist = e.target.result; this.render();
        };
    },
    render() {
        const c = document.getElementById('list-container'); c.innerHTML = "";
        this.playlist.forEach((s, i) => {
            const d = document.createElement('div'); d.innerText = s.name;
            d.style.padding="10px"; d.style.borderBottom="1px solid rgba(255,255,255,0.05)";
            d.onclick = () => { this.load(i); togglePlaylist(); };
            c.appendChild(d);
        });
    },
    load(i) {
        this.index = i; if(this.audio.src) URL.revokeObjectURL(this.audio.src);
        this.audio.src = URL.createObjectURL(this.playlist[i].data);
        document.getElementById('title').innerText = this.playlist[i].name; this.play();
    },
    toggle() { this.audio.paused ? this.play() : this.pause(); },
    play() { this.audio.play(); document.getElementById('play-btn').innerText = "⏸"; this.startVis(); },
    pause() { this.audio.pause(); document.getElementById('play-btn').innerText = "▶"; },
    next() { this.load((this.index+1)%this.playlist.length); },
    prev() { this.load((this.index-1+this.playlist.length)%this.playlist.length); },
    seek(e) { this.audio.currentTime = (e.offsetX / document.getElementById('seek-bar').offsetWidth) * this.audio.duration; },
    getDB: () => new Promise(res => {
        const r = indexedDB.open("MI_DB", 1);
        r.onupgradeneeded = (e) => e.target.result.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
        r.onsuccess = () => res(r.result);
    }),
    startVis() {
        if(this.ctx) return; this.ctx = new AudioContext();
        this.analyser = this.ctx.createAnalyser();
        const src = this.ctx.createMediaElementSource(this.audio);
        src.connect(this.analyser); this.analyser.connect(this.ctx.destination);
        const can = document.getElementById('canvas-v'), c = can.getContext('2d');
        const draw = () => {
            requestAnimationFrame(draw); const f = new Uint8Array(this.analyser.frequencyBinCount);
            this.analyser.getByteFrequencyData(f); c.clearRect(0,0,300,300);
            for(let i=0; i<60; i++) {
                const h = f[i]*0.4; c.strokeStyle = '#00f2ff'; c.lineWidth=2; c.beginPath();
                c.moveTo(150+Math.cos(i*0.1)*80, 150+Math.sin(i*0.1)*80);
                c.lineTo(150+Math.cos(i*0.1)*(80+h), 150+Math.sin(i*0.1)*(80+h)); c.stroke();
            }
        }; draw();
    }
};

function clearData() { if(confirm("Clear everything?")) { indexedDB.deleteDatabase("MI_DB"); location.reload(); } }
engine.init();
</script>
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            // Background Sync Register karna
            if ('sync' in reg) {
                window.addEventListener('online', () => {
                    reg.sync.register('check-for-updates');
                    console.log("Net wapas aaya! Update checking in background...");
                });
            }
        });

        // Agar naya version mil jaye toh user ko bataye bina refresh kar dena
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log("Naya Update mil gaya! App refresh ho rahi hai...");
            window.location.reload();
        });
    }
    </script>
</body>
