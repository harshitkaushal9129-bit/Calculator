<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MI PLAYER PRO | Next-Gen</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script> <style>
        :root {
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.5);
            --bg: #08080a;
            --surface: rgba(255, 255, 255, 0.05);
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --error: #ff4757;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .app-container {
            width: 100%; max-width: 420px; height: 100%;
            background: radial-gradient(circle at top right, #1a1a2e, #08080a);
            position: relative; display: flex; flex-direction: column; overflow: hidden;
        }
        header { padding: 50px 25px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .brand { font-weight: 800; letter-spacing: 4px; font-size: 14px; color: var(--accent); text-transform: uppercase; }
        
        /* Profile Image Styles */
        #user-photo-box { width: 32px; height: 32px; border-radius: 50%; background: var(--surface); border: 2px solid var(--accent); overflow: hidden; display: none; cursor: pointer; }
        #user-photo { width: 100%; height: 100%; object-fit: cover; }
        
        /* Left Side Auth Panel */
        #auth-panel {
            position: absolute; top: 0; left: -100%; width: 85%; height: 100%;
            background: rgba(10,10,15,0.98); backdrop-filter: blur(25px);
            z-index: 200; transition: 0.5s cubic-bezier(0.85, 0, 0.15, 1);
            padding: 50px 25px; border-right: 1px solid rgba(0, 242, 255, 0.2);
        }
        .auth-open { left: 0 !important; }
        .auth-header { color: var(--accent); font-size: 20px; margin-bottom: 30px; display: flex; align-items: center; gap: 10px; }
        .input-group { margin-bottom: 15px; }
        .input-group input {
            width: 100%; padding: 12px; background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
            color: white; outline: none; transition: 0.3s;
        }
        .input-group input:focus { border-color: var(--accent); background: rgba(255,255,255,0.12); }
        .auth-btn {
            width: 100%; padding: 12px; background: var(--accent); border: none;
            border-radius: 8px; color: #000; font-weight: 600; cursor: pointer; margin-top: 10px;
        }
        .auth-links { margin-top: 15px; font-size: 12px; display: flex; flex-direction: column; gap: 8px; }
        .auth-links span { color: var(--text-dim); cursor: pointer; transition: 0.3s; }
        .auth-links span:hover { color: var(--accent); }
        
        /* Image Upload Box */
        .img-upload-label {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; height: 120px; border: 2px dashed rgba(255,255,255,0.1);
            border-radius: 12px; color: var(--text-dim); cursor: pointer; margin-bottom: 15px;
            position: relative; overflow: hidden;
        }
        .img-upload-label img { width: 100%; height: 100%; object-fit: cover; position: absolute; top: 0; left: 0; display: none; }
        .img-upload-label span { font-size: 14px; position: relative; z-index: 5; }

        /* Right Side Settings Panel */
        #side-panel {
            position: absolute; top: 0; right: -100%; width: 80%; height: 100%;
            background: rgba(10,10,15,0.98); backdrop-filter: blur(20px);
            z-index: 100; transition: 0.5s cubic-bezier(0.85, 0, 0.15, 1);
            padding: 60px 30px; border-left: 1px solid rgba(255,255,255,0.1);
        }
        .panel-open { right: 0 !important; }
        
        /* UI Elements */
        .visualizer-orbit { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        #canvas-v { width: 320px; height: 320px; filter: drop-shadow(0 0 20px var(--accent-glow)); }
        .album-art-proxy {
            position: absolute; width: 160px; height: 160px; background: var(--surface);
            border-radius: 50%; display: flex; justify-content: center; align-items: center;
            border: 2px solid rgba(255,255,255,0.1); overflow: hidden;
        }
        .album-art-proxy img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; display: none; }
        .album-art-proxy span { font-size: 60px; filter: grayscale(1); transition: 0.5s; }
        .playing span { filter: grayscale(0); transform: scale(1.1); }
        .track-meta { text-align: center; padding: 20px; }
        .track-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
        .player-core { padding: 40px 30px; background: var(--surface); border-radius: 40px 40px 0 0; backdrop-filter: blur(20px); }
        .bar-bg { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; position: relative; cursor: pointer; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 10px var(--accent); }
        .main-cmds { display: flex; justify-content: space-around; align-items: center; margin-top: 20px;}
        .btn-icon { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .play-trigger { width: 70px; height: 70px; border-radius: 50%; background: var(--accent); color: #000; font-size: 30px; display: flex; justify-content: center; align-items: center; }
        .menu-item { padding: 15px 0; border-bottom: 1px solid rgba(255,255,255,0.05); color: var(--text-main); text-decoration: none; display: block; }
    </style>
</head>
<body>

<div class="app-container" id="player-ui">
    <header>
        <div id="user-photo-box" onclick="toggleAuth()">
            <img id="user-photo" src="" alt="Profile">
        </div>
        <div class="btn-icon" id="auth-icon" onclick="toggleAuth()">👤</div>
        <div class="brand">MI PRO</div>
        <div class="btn-icon" onclick="toggleMenu()">☰</div>
    </header>

    <div id="auth-panel">
        <div class="btn-icon" style="margin-bottom: 20px;" onclick="toggleAuth()">⬅ Back</div>
        <div id="auth-content">
            <div class="auth-header"><span>🔑</span> <span id="auth-title">Login</span></div>
            
            <div id="register-fields" style="display:none;">
                <label class="img-upload-label">
                    <img id="preview-img" src="">
                    <span>➕ Profile Picture</span>
                    <input type="file" id="user-image" accept="image/*" style="display:none;" onchange="previewUserImage(this)">
                </label>
                <div class="input-group"><input type="text" id="user-name" placeholder="Username"></div>
            </div>
            
            <div class="input-group"><input type="email" id="user-email" placeholder="Email Address"></div>
            <div class="input-group"><input type="password" id="user-pass" placeholder="Password"></div>
            <button class="auth-btn" id="auth-submit" onclick="handleAuth()">Login</button>
            
            <div class="auth-links">
                <span onclick="switchAuth('register')">🆕 Create New Account</span>
                <span onclick="switchAuth('forgot-pass')">❓ Forgot Password?</span>
                <span onclick="switchAuth('forgot-user')">🔍 Forgot Username?</span>
            </div>
        </div>
        <div id="user-profile" style="display:none;">
            <div class="auth-header"><span>✅</span> Active Session</div>
            <p id="display-user" style="color: var(--accent); margin-bottom: 20px;"></p>
            <button class="auth-btn" onclick="logout()" style="background: var(--error); color: white;">Logout</button>
        </div>
    </div>

    <div id="side-panel">
        <div class="btn-icon" style="margin-bottom: 30px;" onclick="toggleMenu()">✕ Close</div>
        <h2 style="margin-bottom: 20px; color: var(--accent);">Settings</h2>
        <a href="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/" target="_blank" class="menu-item">🌐 Official Portal</a>
        <div class="menu-item" onclick="clearData()" style="color: #ff4757; cursor: pointer;">🗑 Reset Library</div>
        <label style="display: block; width: 100%; padding: 15px; border: 2px dashed var(--accent); color: var(--accent); text-align: center; border-radius: 15px; margin-top: 20px; cursor: pointer;">
            📁 IMPORT MUSIC
            <input type="file" id="dir-picker" webkitdirectory directory multiple style="display:none">
        </label>
    </div>

    <div class="visualizer-orbit">
        <canvas id="canvas-v"></canvas>
        <div class="album-art-proxy" id="art-box">
            <span id="headphone-icon">🎧</span>
            <img id="track-art-img" src="" alt="Album Art"> </div>
    </div>

    <div class="track-meta">
        <div class="track-title" id="title">Welcome, Kaushal ji</div>
        <div class="track-artist" id="artist">Secure & Smart Player</div>
    </div>

    <div class="player-core">
        <div class="bar-bg" id="seek-bar"><div class="bar-fill" id="fill"></div></div>
        <div class="main-cmds">
            <button class="btn-icon" onclick="engine.prev()">⏮</button>
            <button class="btn-icon play-trigger" id="play-btn" onclick="engine.toggle()">▶</button>
            <button class="btn-icon" onclick="engine.next()">⏭</button>
        </div>
    </div>
</div>

<script>
// Firebase Initialization
const firebaseConfig = {
    apiKey: "AIzaSyDQ0Y8M9OGSInOlUltuysgmKOYGKX8dQvg",
    authDomain: "calculator-by-kaushalji.firebaseapp.com",
    databaseURL: "https://calculator-by-kaushalji-default-rtdb.firebaseio.com",
    projectId: "calculator-by-kaushalji",
    storageBucket: "calculator-by-kaushalji.firebasestorage.app",
    messagingSenderId: "156130281294",
    appId: "1:156130281294:web:73b80a5f344daeabdd001f"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db_ref = firebase.database();
const storage = firebase.storage(); // Storage Service Initialized

let currentMode = 'login';

// Auth Functions
function toggleAuth() { document.getElementById('auth-panel').classList.toggle('auth-open'); }
function toggleMenu() { document.getElementById('side-panel').classList.toggle('panel-open'); }

function switchAuth(mode) {
    currentMode = mode;
    const title = document.getElementById('auth-title');
    const btn = document.getElementById('auth-submit');
    const regFields = document.getElementById('register-fields');
    const passBox = document.getElementById('user-pass');

    regFields.style.display = (mode === 'register') ? 'block' : 'none';
    passBox.style.display = (mode === 'forgot-user') ? 'none' : 'block';

    if(mode === 'register') { title.innerText = "Register"; btn.innerText = "Create Account"; }
    else if(mode === 'login') { title.innerText = "Login"; btn.innerText = "Login"; }
    else if(mode === 'forgot-pass') { title.innerText = "Reset Pass"; btn.innerText = "Send Reset Link"; }
    else if(mode === 'forgot-user') { title.innerText = "Find User"; btn.innerText = "Check Email"; }
}

function previewUserImage(input) {
    if(input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function(e) {
            document.getElementById('preview-img').src = e.target.result;
            document.getElementById('preview-img').style.display = 'block';
        }
        reader.readAsDataURL(input.files[0]);
    }
}

async function handleAuth() {
    const email = document.getElementById('user-email').value;
    const pass = document.getElementById('user-pass').value;
    const name = document.getElementById('user-name').value;
    const imageFile = document.getElementById('user-image').files[0];

    try {
        if(currentMode === 'register') {
            if(!imageFile) throw new Error("Please upload a profile picture.");
            
            const res = await auth.createUserWithEmailAndPassword(email, pass);
            
            // Upload Image to Storage
            const storageRef = storage.ref('users/' + res.user.uid + '/profile.jpg');
            await storageRef.put(imageFile);
            const downloadURL = await storageRef.getDownloadURL();
            
            // Save Username & Image URL in Database
            await db_ref.ref('users/' + res.user.uid).set({ username: name, photoURL: downloadURL });
            alert("Account Created!");
        } else if(currentMode === 'login') {
            await auth.signInWithEmailAndPassword(email, pass);
        } else if(currentMode === 'forgot-pass') {
            await auth.sendPasswordResetEmail(email);
            alert("Reset link sent to email!");
        } else if(currentMode === 'forgot-user') {
            alert("Check email for your username details.");
        }
    } catch(err) { alert(err.message); }
}

function logout() { auth.signOut(); }

auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('auth-content').style.display = 'none';
        document.getElementById('user-profile').style.display = 'block';
        db_ref.ref('users/' + user.uid).once('value', s => {
            const userData = s.val();
            const name = userData ? userData.username : user.email;
            const photo = userData ? userData.photoURL : "";
            
            document.getElementById('display-user').innerText = "Hi, " + name;
            document.getElementById('title').innerText = "Logged in: " + name;
            
            // Headphone Icon ki jagah Profile Pic set karna
            const hIcon = document.getElementById('headphone-icon');
            const pArt = document.getElementById('track-art-img');
            const hPhoto = document.getElementById('user-photo');
            const hIconBtn = document.getElementById('auth-icon');
            const hPhotoBox = document.getElementById('user-photo-box');
            
            if(photo) {
                hPhoto.src = photo;
                hPhotoBox.style.display = 'block';
                hIconBtn.style.display = 'none';
                
                pArt.src = photo; // Player center image set profile photo
                pArt.style.display = 'block';
                hIcon.style.display = 'none';
            }
        });
    } else {
        document.getElementById('auth-content').style.display = 'block';
        document.getElementById('user-profile').style.display = 'none';
        document.getElementById('title').innerText = "Welcome, Kaushal ji";
        
        // Reset Player Icons to Default
        document.getElementById('user-photo-box').style.display = 'none';
        document.getElementById('auth-icon').style.display = 'block';
        
        document.getElementById('track-art-img').style.display = 'none';
        document.getElementById('headphone-icon').style.display = 'block';
    }
});

// Player Engine (Same as yours but integrated)
const engine = {
    audio: new Audio(), playlist: [], index: 0, ctx: null, analyser: null,
    init: function() { this.listeners(); this.loadLocalData(); },
    listeners: function() {
        this.audio.ontimeupdate = () => {
            const p = (this.audio.currentTime / this.audio.duration) * 100 || 0;
            document.getElementById('fill').style.width = p + "%";
        };
        this.audio.onended = () => this.next();
        document.getElementById('dir-picker').onchange = (e) => this.handleFiles(e.target.files);
    },
    handleFiles: async function(files) {
        const db = await this.getDB();
        const tx = db.transaction("songs", "readwrite");
        const store = tx.objectStore("songs");
        Array.from(files).filter(f => f.type.startsWith('audio/')).forEach(f => store.add({ name: f.name, data: f }));
        tx.oncomplete = () => location.reload();
    },
    loadLocalData: async function() {
        const db = await this.getDB();
        db.transaction("songs").objectStore("songs").getAll().onsuccess = (e) => {
            this.playlist = e.target.result;
            if(this.playlist.length > 0) this.loadTrack(0, false);
        };
    },
    loadTrack: function(i, play = true) {
        this.index = i;
        const track = this.playlist[i];
        if(this.audio.src) URL.revokeObjectURL(this.audio.src);
        this.audio.src = URL.createObjectURL(track.data);
        document.getElementById('title').innerText = track.name.split('.')[0];
        if(play) this.play();
    },
    toggle: function() { (this.audio.paused) ? this.play() : this.pause(); },
    play: function() {
        this.audio.play().then(() => {
            document.getElementById('play-btn').innerText = "⏸";
            this.startVisuals();
        });
    },
    pause: function() { this.audio.pause(); document.getElementById('play-btn').innerText = "▶"; },
    next: function() { this.index = (this.index + 1) % this.playlist.length; this.loadTrack(this.index); },
    prev: function() { this.index = (this.index - 1 + this.playlist.length) % this.playlist.length; this.loadTrack(this.index); },
    getDB: () => new Promise(res => {
        const r = indexedDB.open("MI_PRO_DB", 1);
        r.onupgradeneeded = (e) => e.target.result.createObjectStore("songs", { keyPath: "id", autoIncrement: true });
        r.onsuccess = () => res(r.result);
    }),
    startVisuals: function() {
        if(this.ctx) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.analyser = this.ctx.createAnalyser();
        const src = this.ctx.createMediaElementSource(this.audio);
        src.connect(this.analyser); this.analyser.connect(this.ctx.destination);
        const canvas = document.getElementById('canvas-v');
        const ctx = canvas.getContext('2d');
        const draw = () => {
            requestAnimationFrame(draw);
            const fbc = new Uint8Array(this.analyser.frequencyBinCount);
            this.analyser.getByteFrequencyData(fbc);
            ctx.clearRect(0,0,320,320);
            for(let i=0; i<80; i++) {
                const bar_h = fbc[i] * 0.4;
                ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 3; ctx.beginPath();
                ctx.moveTo(160 + Math.cos(i*0.08)*90, 160 + Math.sin(i*0.08)*90);
                ctx.lineTo(160 + Math.cos(i*0.08)*(90+bar_h), 160 + Math.sin(i*0.08)*(90+bar_h));
                ctx.stroke();
            }
        };
        draw();
    }
};
function clearData() { indexedDB.deleteDatabase("MI_PRO_DB"); location.reload(); }
engine.init();
</script>
</body>
</html>
