<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MI PLAYER PRO | Next-Gen</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2ff">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script> 

    <style>
        :root { --accent: #00f2ff; --accent-glow: rgba(0, 242, 255, 0.5); --bg: #08080a; --surface: rgba(255, 255, 255, 0.05); --text-main: #ffffff; --text-dim: #a0a0a0; --error: #ff4757; --success: #00ff88; }
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; overflow: hidden; }
        
        .side-links { position: fixed; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 1; padding: 20px; }
        .side-links.left { left: 20px; }
        .side-links.right { right: 20px; }
        .nav-icon-link { text-decoration: none; display: flex; flex-direction: column; align-items: center; gap: 5px; opacity: 0.4; transition: 0.3s; }
        .nav-icon-link:hover { opacity: 1; transform: scale(1.1); }
        .nav-icon-link i { font-size: 24px; color: var(--accent); }
        .nav-icon-link label { font-size: 10px; color: var(--accent); font-weight: bold; cursor: pointer; text-transform: uppercase; }

        .app-container { width: 100%; max-width: 420px; height: 100%; background: radial-gradient(circle at top right, #1a1a2e, #08080a); position: relative; display: flex; flex-direction: column; overflow: hidden; border-left: 1px solid rgba(255,255,255,0.05); border-right: 1px solid rgba(255,255,255,0.05); z-index: 10; box-shadow: 0 0 50px rgba(0,0,0,1); }
        
        header { padding: 50px 25px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .brand { font-weight: 800; letter-spacing: 4px; font-size: 14px; color: var(--accent); text-transform: uppercase; text-shadow: 0 0 10px var(--accent-glow); }
        #user-photo-box { width: 38px; height: 38px; border-radius: 50%; background: var(--surface); border: 2px solid var(--accent); overflow: hidden; display: none; cursor: pointer; }
        #user-photo { width: 100%; height: 100%; object-fit: cover; }

        /* Panels */
        #playlist-panel, #auth-panel, #side-panel { position: absolute; top: 0; width: 100%; height: 100%; background: rgba(8, 8, 10, 0.98); backdrop-filter: blur(25px); z-index: 250; transition: 0.5s cubic-bezier(0.85, 0, 0.15, 1); padding: 60px 20px; }
        #playlist-panel { right: -100%; width: 85%; border-left: 1px solid var(--accent); }
        #side-panel { right: -100%; width: 85%; border-left: 1px solid var(--accent); z-index: 300; }
        #auth-panel { left: -100%; z-index: 200; }
        .panel-open-r { right: 0 !important; }
        .panel-open-l { left: 0 !important; }

        /* Track Info & Visualizer */
        .visualizer-orbit { flex: 1; display: flex; justify-content: center; align-items: center; position: relative; }
        #canvas-v { width: 340px; height: 340px; filter: drop-shadow(0 0 25px var(--accent-glow)); }
        .album-art-proxy { position: absolute; width: 170px; height: 170px; background: var(--surface); border-radius: 50%; display: flex; justify-content: center; align-items: center; border: 3px solid rgba(255, 255, 255, 0.05); overflow: hidden; }
        .album-art-proxy img { width: 100%; height: 100%; object-fit: cover; display: none; }
        
        .track-meta { text-align: center; padding: 10px 20px; }
        .track-title { font-size: 22px; font-weight: 800; margin-bottom: 5px; }
        .track-artist { color: var(--accent); font-size: 14px; opacity: 0.8; letter-spacing: 1px; }

        .app-info-container { background: rgba(255,255,255,0.03); border-radius: 20px; padding: 15px; margin: 15px; border: 1px solid rgba(255,255,255,0.05); }
        .info-row { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 5px; }
        .info-value { color: var(--accent); font-weight: bold; }

        /* Controls */
        .player-core { padding: 20px 30px 40px; background: rgba(255, 255, 255, 0.03); border-radius: 45px 45px 0 0; backdrop-filter: blur(20px); }
        .bar-bg { height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; margin-top: 10px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--accent); width: 0%; box-shadow: 0 0 15px var(--accent); }
        .main-cmds { display: flex; justify-content: space-around; align-items: center; margin-top: 25px; }
        .play-trigger { width: 70px; height: 70px; border-radius: 50%; background: var(--accent); color: #000; font-size: 28px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 20px var(--accent-glow); cursor: pointer; }
        
        #toast { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 12px 20px; border-radius: 10px; z-index: 1000; transition: 0.5s; backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); text-align: center; width: 80%; }
        .toast-show { top: 30px !important; }
    </style>
</head>
<body>

<div class="side-links left">
    <a href="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/" target="_blank" class="nav-icon-link"><i class="fas fa-university"></i><label>Official Portal</label></a>
    <a href="#" class="nav-icon-link"><i class="fas fa-folder-open"></i><label>PDF Vault</label></a>
    <a href="#" class="nav-icon-link"><i class="fas fa-id-card"></i><label>ID Gen</label></a>
</div>

<div class="app-container">
    <header>
        <div id="user-photo-box" onclick="toggleAuth()"><img id="user-photo" src=""></div>
        <i class="fas fa-user-circle" id="auth-icon" onclick="toggleAuth()" style="font-size: 28px; cursor:pointer;"></i>
        <div class="brand">MI PRO</div>
        <div style="display: flex; gap: 20px;">
            <i class="fas fa-music" onclick="togglePlaylist()" style="cursor:pointer; color: var(--accent);"></i>
            <i class="fas fa-bars" onclick="toggleMenu()" style="cursor:pointer;"></i>
        </div>
    </header>

    <div id="playlist-panel">
        <div style="display:flex; justify-content:space-between; color:var(--accent); margin-bottom:20px;"><h3>PLAYLIST</h3><i class="fas fa-times" onclick="togglePlaylist()"></i></div>
        <div id="list-container" style="overflow-y:auto; height:80%;"></div>
    </div>

    <div id="side-panel">
        <div style="display:flex; justify-content:space-between; color:var(--accent); margin-bottom:20px;"><h3>SETTINGS</h3><i class="fas fa-times" onclick="toggleMenu()"></i></div>
        <label style="display:block; padding:20px; border:2px dashed var(--accent); text-align:center; border-radius:15px; cursor:pointer;">
            <i class="fas fa-cloud-upload-alt"></i> IMPORT SONGS
            <input type="file" id="dir-picker" webkitdirectory directory multiple style="display:none">
        </label>
        <button onclick="clearData()" style="width:100%; margin-top:20px; padding:15px; background:var(--error); border:none; border-radius:10px; color:white;">CLEAR LIBRARY</button>
    </div>

    <div id="auth-panel">
        <div onclick="toggleAuth()" style="margin-bottom:20px; cursor:pointer;"><i class="fas fa-arrow-left"></i> BACK</div>
        <div id="auth-content">
            <h2 id="auth-title">Login</h2><br>
            <input type="email" id="user-email" placeholder="Email" style="width:100%; padding:12px; margin-bottom:10px; background:var(--surface); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:8px;">
            <input type="password" id="user-pass" placeholder="Password" style="width:100%; padding:12px; margin-bottom:10px; background:var(--surface); border:1px solid rgba(255,255,255,0.1); color:white; border-radius:8px;">
            <button onclick="handleAuth()" class="play-trigger" style="width:100%; height:50px; border-radius:10px; font-size:16px;">SIGN IN</button>
        </div>
        <div id="user-profile" style="display:none; text-align:center;">
            <h3 id="display-user"></h3><br>
            <button onclick="logout()" style="padding:10px 20px; background:var(--surface); color:white; border:none; border-radius:8px;">LOGOUT</button>
        </div>
    </div>

    <div class="visualizer-orbit">
        <canvas id="canvas-v" width="340" height="340"></canvas>
        <div class="album-art-proxy">
            <i class="fas fa-headphones" id="hp-icon" style="font-size: 50px; opacity:0.3;"></i>
            <img id="track-art-img" src="">
        </div>
    </div>

    <div class="track-meta">
        <div class="track-title" id="title">MI Player Pro</div>
        <div class="track-artist" id="artist">Ready to Play</div>
    </div>

    <div class="app-info-container">
        <div class="info-row"><span>Software:</span> <span class="info-value">v3.0.0 Ultra</span></div>
        <div class="info-row"><span>Dev:</span> <span class="info-value">Kaushal Ji</span></div>
    </div>

    <div class="player-core">
        <div class="info-row">
            <span id="current-time">00:00</span>
            <span id="total-duration">00:00</span>
        </div>
        <div class="bar-bg" onclick="engine.seek(event)"><div class="bar-fill" id="fill"></div></div>
        <div class="main-cmds">
            <i class="fas fa-backward" onclick="engine.prev()" style="font-size:24px; cursor:pointer;"></i>
            <div class="play-trigger" id="play-btn" onclick="engine.toggle()"><i class="fas fa-play"></i></div>
            <i class="fas fa-forward" onclick="engine.next()" style="font-size:24px; cursor:pointer;"></i>
        </div>
    </div>
</div>

<script>
// Firebase Initialization
const firebaseConfig = { apiKey: "AIzaSyDQ0Y8M9OGSInOlUltuysgmKOYGKX8dQvg", authDomain: "calculator-by-kaushalji.firebaseapp.com", databaseURL: "https://calculator-by-kaushalji-default-rtdb.firebaseio.com", projectId: "calculator-by-kaushalji", storageBucket: "calculator-by-kaushalji.firebasestorage.app", messagingSenderId: "156130281294", appId: "1:156130281294:web:73b80a5f344daeabdd001f" };
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth(); const db_ref = firebase.database();

function showToast(msg) {
    let t = document.getElementById('toast') || document.createElement('div');
    t.id = 'toast'; t.innerText = msg; document.body.appendChild(t);
    t.className = 'toast-show'; setTimeout(() => t.className = '', 3000);
}

function toggleAuth() { document.getElementById('auth-panel').classList.toggle('panel-open-l'); }
function toggleMenu() { document.getElementById('side-panel').classList.toggle('panel-open-r'); }
function togglePlaylist() { document.getElementById('playlist-panel').classList.toggle('panel-open-r'); }

// Player Engine Logic
const engine = {
    audio: new Audio(), playlist: [], index: 0, ctx: null, analyser: null,
    init: function() {
        this.audio.ontimeupdate = () => {
            const cur = this.audio.currentTime; const dur = this.audio.duration;
            document.getElementById('fill').style.width = (cur / dur * 100 || 0) + "%";
            document.getElementById('current-time').innerText = this.formatTime(cur);
            if(!isNaN(dur)) document.getElementById('total-duration').innerText = this.formatTime(dur);
        };
        this.audio.onended = () => this.next();
        document.getElementById('dir-picker').onchange = (e) => this.handleFiles(e.target.files);
        this.loadLocalData();
    },
    formatTime: s => { let m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${sec<10?'0':''}${sec}`; },
    handleFiles: async function(files) {
        const db = await this.getDB(); const tx = db.transaction("songs", "readwrite");
        Array.from(files).filter(f => f.type.startsWith('audio')).forEach(f => tx.objectStore("songs").add({ name: f.name, data: f }));
        tx.oncomplete = () => { showToast("Imported!"); this.loadLocalData(); };
    },
    loadLocalData: async function() {
        const db = await this.getDB();
        db.transaction("songs").objectStore("songs").getAll().onsuccess = (e) => {
            this.playlist = e.target.result; this.render();
            if(this.playlist.length > 0 && !this.audio.src) this.load(0, false);
        };
    },
    render: function() {
        const c = document.getElementById('list-container'); c.innerHTML = "";
        this.playlist.forEach((s, i) => {
            let d = document.createElement('div'); d.innerText = s.name;
            d.style.padding = "12px"; d.style.borderBottom = "1px solid #222"; d.style.cursor = "pointer";
            d.onclick = () => this.load(i); c.appendChild(d);
        });
    },
    load: function(i, play=true) {
        this.index = i; const s = this.playlist[i];
        this.audio.src = URL.createObjectURL(s.data);
        document.getElementById('title').innerText = s.name.split('.')[0];
        if(play) this.play();
    },
    toggle: function() { this.audio.paused ? this.play() : this.pause(); },
    play: function() { this.audio.play(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-pause"></i>'; this.visualize(); },
    pause: function() { this.audio.pause(); document.getElementById('play-btn').innerHTML = '<i class="fas fa-play"></i>'; },
    next: function() { this.index = (this.index+1)%this.playlist.length; this.load(this.index); },
    prev: function() { this.index = (this.index-1+this.playlist.length)%this.playlist.length; this.load(this.index); },
    seek: function(e) { this.audio.currentTime = (e.offsetX / e.target.offsetWidth) * this.audio.duration; },
    getDB: () => new Promise(res => {
        const r = indexedDB.open("MI_DB", 1);
        r.onupgradeneeded = e => e.target.result.createObjectStore("songs", {keyPath:"id", autoIncrement:true});
        r.onsuccess = () => res(r.result);
    }),
    visualize: function() {
        if(this.ctx) return;
        this.ctx = new AudioContext(); this.analyser = this.ctx.createAnalyser();
        const src = this.ctx.createMediaElementSource(this.audio);
        src.connect(this.analyser); this.analyser.connect(this.ctx.destination);
        const can = document.getElementById('canvas-v'), ctx = can.getContext('2d');
        const draw = () => {
            requestAnimationFrame(draw); const data = new Uint8Array(this.analyser.frequencyBinCount);
            this.analyser.getByteFrequencyData(data); ctx.clearRect(0,0,340,340);
            for(let i=0; i<100; i++) {
                let r = 100, x = 170 + Math.cos(i)*r, y = 170 + Math.sin(i)*r;
                let x2 = 170 + Math.cos(i)*(r + data[i]*0.4), y2 = 170 + Math.sin(i)*(r + data[i]*0.4);
                ctx.strokeStyle = '#00f2ff'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x2,y2); ctx.stroke();
            }
        }; draw();
    }
};

// Auth Handlers
async function handleAuth() {
    const e = document.getElementById('user-email').value, p = document.getElementById('user-pass').value;
    try { await auth.signInWithEmailAndPassword(e, p); showToast("Success!"); toggleAuth(); } 
    catch(err) { showToast(err.message); }
}
function logout() { auth.signOut(); location.reload(); }
auth.onAuthStateChanged(user => {
    if(user) {
        document.getElementById('auth-content').style.display = 'none';
        document.getElementById('user-profile').style.display = 'block';
        document.getElementById('display-user').innerText = "Hi, " + user.email.split('@')[0];
    }
});

function clearData() { indexedDB.deleteDatabase("MI_DB"); location.reload(); }
engine.init();
</script>
<script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            // Background Sync Register karna
            if ('sync' in reg) {
                window.addEventListener('online', () => {
                    reg.sync.register('check-for-updates');
                    console.log("Net wapas aaya! Update checking in background...");
                });
            }
        });

        // Agar naya version mil jaye toh user ko bataye bina refresh kar dena
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log("Naya Update mil gaya! App refresh ho rahi hai...");
            window.location.reload();
        });
    }
</script>
</body>
</html>
