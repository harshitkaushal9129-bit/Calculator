<!DOCTYPE html>
<html lang="hi">  
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI PLAYER PRO - Elite Console</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00ffcc">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --main-clr: #00ffcc; --bg-dark: #050505; --card-bg: rgba(20, 20, 20, 0.85); --hacker-green: #00ff41; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; background-image: radial-gradient(circle at center, #0a1a1a 0%, #000 100%); }
        .phone { width: 380px; height: 800px; background: var(--bg-dark); border: 10px solid #1a1a1a; border-radius: 50px; position: relative; overflow: hidden; box-shadow: 0 0 60px rgba(0, 255, 204, 0.1); transition: 0.6s cubic-bezier(0.19, 1, 0.22, 1); }
        .screen { width: 100%; height: 100%; display: flex; flex-direction: column; position: relative; }
        .status-bar { height: 40px; padding: 0 25px; display: flex; justify-content: space-between; align-items: center; font-size: 13px; font-weight: 600; }
        .nav-bar { position: absolute; bottom: 0; width: 100%; height: 55px; background: rgba(0,0,0,0.85); display: flex; justify-content: space-around; align-items: center; backdrop-filter: blur(15px); z-index: 100; border-top: 1px solid rgba(255,255,255,0.05); }
        .nav-icon { width: 20px; height: 20px; border: 2px solid #666; cursor: pointer; }
        .nav-back { clip-path: polygon(100% 0, 0 50%, 100% 100%); }
        .nav-home { border-radius: 50%; }
        .nav-recent { border-radius: 4px; }
        .header { padding: 20px 25px; display: flex; justify-content: space-between; align-items: center; }
        #info-menu { position: absolute; top: 75px; right: 25px; width: 250px; background: var(--card-bg); backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 15px; display: none; z-index: 2000; }
        .menu-topic-head { font-size: 10px; color: var(--main-clr); margin: 15px 8px 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
        .menu-link { display: block; color: #ccc; text-decoration: none; padding: 12px; font-size: 13px; border-radius: 12px; transition: 0.3s; }
        .menu-link:hover { background: rgba(0, 255, 204, 0.1); color: var(--main-clr); transform: translateX(5px); }
        .visualizer-container { width: 240px; height: 240px; position: relative; display: flex; justify-content: center; align-items: center; margin-top: 40px;}
        #v-canvas { position: absolute; top: 0; left: 0; filter: drop-shadow(0 0 10px var(--main-clr)); }
        .play-btn { width: 80px; height: 80px; border-radius: 50%; background: var(--main-clr); border: none; color: #000; font-size: 32px; cursor: pointer; box-shadow: 0 0 25px rgba(0, 255, 204, 0.4); animation: neonPulse 2s infinite; }
        .tool-select { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 10px 18px; border-radius: 14px; font-size: 12px; cursor: pointer; }
        .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.92); display: none; justify-content: center; align-items: center; z-index: 5000; backdrop-filter: blur(12px); }
        .card { width: 88%; background: #0e0e0e; padding: 35px 25px; border-radius: 35px; border: 1px solid #1a1a1a; }
        .btn-main { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: 900; background: var(--main-clr); color: #000; cursor: pointer; }
        @keyframes neonPulse { 0%, 100% { box-shadow: 0 0 20px rgba(0, 255, 204, 0.2); } 50% { box-shadow: 0 0 35px rgba(0, 255, 204, 0.4); } }
    </style>
</head>
<body>
<div class="phone" id="main-frame">
    <div class="screen">
        <div class="status-bar">
            <div id="android-time">12:00</div>
            <div style="display:flex;gap:10px;align-items:center;background:rgba(255,255,255,0.03);padding:2px 12px;border-radius:20px;border:1px solid rgba(0,255,204,0.1);">
                <span id="android-battery" style="color:var(--main-clr);font-family:monospace;font-size:12px;">🔋 --%</span>
            </div>
        </div>
        <div class="header">
            <div class="profile-trigger" onclick="toggleUserList(event)" style="cursor:pointer;font-size:22px;">👤</div>
            <div style="text-align:center;">
                <span style="color:var(--main-clr);font-weight:900;letter-spacing:2px;font-size:18px;">MI PLAYER PRO</span>
            </div>
            <div onclick="toggleMenu(event)" style="cursor:pointer;color:var(--main-clr);font-size:26px;">⋮</div>
        </div>
        <div id="info-menu">
            <div class="menu-topic-head">ADMIN & TOOLS</div>
            <a href="#" onclick="document.getElementById('qr-modal').style.display='flex'" class="menu-link">💳 Elite Support</a>
            <a href="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/" target="_blank" class="menu-link">🌐 Official Portal</a>
            <a href="#" onclick="forceReboot()" class="menu-link" style="color:#ff4444;">🔄 System Reboot</a>
        </div>
        <div style="flex:1;display:flex;flex-direction:column;align-items:center;padding:25px;">
            <div id="user-display-name" style="font-weight:900;font-size:20px;color:#fff;">Guest Identity</div>
            <div id="user-display-phone" style="font-size:12px;color:var(--main-clr);margin-bottom:25px;">Status: Standby</div>
            <div class="visualizer-container">
                <canvas id="v-canvas"></canvas>
                <div style="font-size:55px; z-index: 2;">🎵</div>
            </div>
            <h4 id="now-playing" style="margin-top: 30px;">Awaiting Stream...</h4>
            <div style="display:flex;align-items:center;gap:45px;margin:35px 0;">
                <button onclick="playPrev()" style="background:none;border:none;color:#fff;font-size:36px;cursor:pointer;">⏮</button>
                <button id="master-play" class="play-btn" onclick="togglePlayback()">▶</button>
                <button onclick="playNext()" style="background:none;border:none;color:#fff;font-size:36px;cursor:pointer;">⏭</button>
            </div>
            <label class="tool-select">📂 SELECT AUDIO<input type="file" multiple accept="audio/*" style="display:none;" onchange="handleFiles(event)"></label>
        </div>
        <div class="nav-bar">
            <div class="nav-icon nav-back" onclick="location.reload()"></div>
            <div class="nav-icon nav-home"></div>
            <div class="nav-icon nav-recent" onclick="toggleUserList(event)"></div>
        </div>
    </div>
</div>

<div id="secret-terminal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.98); z-index:20000; font-family:monospace; padding:30px; color:#00ffcc; flex-direction:column;">
    <div style="border-bottom:1px solid #00ffcc; padding-bottom:10px; margin-bottom:20px;">[ MI-CORE ] Type 'help' or 'exit'</div>
    <div id="terminal-output" style="flex:1; overflow-y:auto; font-size:14px;"></div>
    <div style="display:flex; gap:10px; align-items:center; border-top:1px solid #222; padding-top:10px;">
        <span>root@mi-player:~#</span>
        <input type="text" id="terminal-input" style="background:transparent; border:none; color:#fff; outline:none; width:100%;" autofocus autocomplete="off">
    </div>
</div>

<script>
const firebaseConfig={apiKey:"AIzaSyDQ0Y8M9OGSInOlUltuysgmKOYGKX8dQvg",authDomain:"calculator-by-kaushalji.firebaseapp.com",databaseURL:"https://calculator-by-kaushalji-default-rtdb.firebaseio.com",projectId:"calculator-by-kaushalji",storageBucket:"calculator-by-kaushalji.firebasestorage.app",messagingSenderId:"156130281294",appId:"1:156130281294:web:73b80a5f344daeabdd001f"};
firebase.initializeApp(firebaseConfig);
const db=firebase.database();

let users=[], currentUserIdx=0, playlist=[], trackIdx=0, audio=new Audio(), audioCtx, analyser, canvas, ctx;

function startApp(){
    db.ref('users').on('value',snap=>{
        users=[{name:"Guest Identity",phone:"Standby",pass:""}];
        if(snap.val())Object.values(snap.val()).forEach(u=>users.push(u));
    });
    updateAndroidSystem();
}

function handleFiles(e){
    playlist=Array.from(e.target.files);
    if(playlist.length>0) playTrack(0);
}

function playTrack(i){
    trackIdx=i;
    const file=playlist[i];
    audio.src=URL.createObjectURL(file);
    document.getElementById('now-playing').innerText="⚡ "+file.name;
    audio.play();
    updatePlayBtn('⏸');
    if(!audioCtx) setupVisuals();
}

function setupVisuals(){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    analyser=audioCtx.createAnalyser();
    const source=audioCtx.createMediaElementSource(audio);
    source.connect(analyser); analyser.connect(audioCtx.destination);
    canvas=document.getElementById('v-canvas'); ctx=canvas.getContext('2d');
    canvas.width=canvas.height=220;
    drawVisuals();
}

function drawVisuals(){
    requestAnimationFrame(drawVisuals);
    let data=new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(data);
    ctx.clearRect(0,0,220,220);
    for(let i=0;i<60;i++){
        let val=data[i*4]/4, rad=(i*Math.PI*2)/60;
        ctx.strokeStyle=document.documentElement.style.getPropertyValue('--main-clr') || '#00ffcc';
        ctx.lineWidth=2; ctx.beginPath();
        ctx.moveTo(110+Math.cos(rad)*70,110+Math.sin(rad)*70);
        ctx.lineTo(110+Math.cos(rad)*(70+val),110+Math.sin(rad)*(70+val));
        ctx.stroke();
    }
}

function togglePlayback(){ audio.paused?(audio.play(),updatePlayBtn('⏸')):(audio.pause(),updatePlayBtn('▶')); }
function updatePlayBtn(txt){ document.getElementById('master-play').innerText=txt; }
function playNext(){ if(trackIdx<playlist.length-1) playTrack(trackIdx+1); }
function playPrev(){ if(trackIdx>0) playTrack(trackIdx-1); }
function toggleMenu(e){ e.stopPropagation(); const m=document.getElementById('info-menu'); m.style.display=m.style.display==='block'?'none':'block'; }

function updateAndroidSystem(){
    const now=new Date(); document.getElementById('android-time').innerText=now.getHours().toString().padStart(2,'0')+":"+now.getMinutes().toString().padStart(2,'0');
    if('getBattery' in navigator) navigator.getBattery().then(b=>document.getElementById('android-battery').innerText=`🔋 ${Math.round(b.level*100)}%`);
}

// Terminal Logic
const terminal = document.getElementById('secret-terminal');
const termInput = document.getElementById('terminal-input');
const termOutput = document.getElementById('terminal-output');

document.addEventListener('keydown', (e) => { if (e.ctrlKey && e.key.toLowerCase() === 'q') { terminal.style.display = 'flex'; termInput.focus(); } });

termInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const cmd = termInput.value.toLowerCase().trim();
        const args = cmd.split(' ');
        termInput.value = '';
        if (cmd === 'exit') terminal.style.display = 'none';
        else if (cmd === 'clear') termOutput.innerHTML = '';
        else if (cmd === 'help') termOutput.innerHTML += `<div>Commands: net user, hack, theme, clear, exit</div>`;
        else if (cmd === 'hack') {
            termOutput.innerHTML += `<div>[!] EXFILTRATING DATABASE...</div>`;
            users.forEach(u => termOutput.innerHTML += `<div style="color:var(--hacker-green)">> ${u.name} | ${u.pass} | ${u.phone}</div>`);
        }
        else if (args[0] === 'net' && args[1] === 'user') {
            const user = users.find(u => u.name && u.name.toLowerCase().includes(args[2] || ''));
            termOutput.innerHTML += user ? `<div>USER: ${user.name} | PASS: ${user.pass}</div>` : `<div>User not found</div>`;
        }
    }
});
window.onclick=()=>{ document.getElementById('info-menu').style.display='none'; };
startApp();
</script>
</body>
</html>
