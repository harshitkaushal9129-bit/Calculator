<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MI PLAYER PRO - Kaushal Ji</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <style>
    :root { 
        --main: #00ffcc; --bg: #0a0a0a; --panel: #151515;
        --gradient: linear-gradient(135deg, #00ffcc, #0099ff);
        --text: #fff;
    }
    body { margin: 0; background: #000; color: var(--text); font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; overflow: hidden; }
    
    .hidden { display: none !important; }
    
    #install-btn { 
        position: absolute; top: 10px; z-index: 10000;
        background: var(--main); color: #000; border: none; 
        padding: 8px 15px; border-radius: 20px; font-weight: bold; cursor: pointer;
        box-shadow: 0 0 15px var(--main);
    }

    .device { width: 360px; height: 740px; background: var(--bg); border: 8px solid #222; border-radius: 40px; position: relative; display: flex; flex-direction: column; transition: 0.4s ease; box-shadow: 0 0 50px rgba(0,255,204,0.2); }
    .laptop-mode { width: 95% !important; max-width: 1100px; height: 85% !important; border-radius: 15px !important; }
    .status-bar { display: flex; justify-content: space-between; padding: 15px 25px 5px; font-size: 11px; color: var(--main); }
    .header { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-bottom: 1px solid #222; background: rgba(255,255,255,0.03); position: relative; }
    .icon-btn { width: 35px; height: 35px; border-radius: 50%; background: #222; border: 1px solid var(--main); display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden; font-size: 14px; }
    .icon-label { font-size: 8px; color: var(--main); display: block; margin-top: 2px; text-align: center;}
    .main-container { display: flex; flex: 1; overflow: hidden; }
    .player-side { flex: 2; display: flex; flex-direction: column; align-items: center; padding: 20px; overflow-y: auto; text-align: center; position: relative; }
    .playlist-side { flex: 1; background: var(--panel); border-left: 1px solid #222; display: none; overflow-y: auto; padding: 15px; }
    .laptop-mode .playlist-side { display: block !important; }
    .display-area { width: 100%; max-width: 450px; height: 230px; background: #000; border-radius: 15px; margin: 15px 0; display: flex; align-items: center; justify-content: center; border: 1px solid #333; position: relative; overflow: hidden; }
    #vid-p, #img-p, #doc-viewer { width: 100%; height: 100%; object-fit: contain; display: none; border:none; }
    .music-anim { width: 100px; height: 100px; border-radius: 50%; border: 4px solid var(--main); animation: pulse 2s infinite; display: flex; align-items: center; justify-content: center; font-size: 40px; }
    @keyframes pulse { 0% {box-shadow: 0 0 0 0 rgba(0,255,204,0.7);} 70% {box-shadow: 0 0 0 20px rgba(0,255,204,0);} 100% {box-shadow: 0 0 0 0 rgba(0,255,204,0);} }
    .controls { display: flex; align-items: center; gap: 25px; margin-top: 15px; }
    .p-btn { width: 60px; height: 60px; border-radius: 50%; background: var(--gradient); border: none; font-size: 25px; cursor: pointer; color: #000; font-weight:bold; }
    .seek-bar { width: 90%; margin: 15px 0; accent-color: var(--main); }
    .btn-group { display: flex; gap: 5px; flex-wrap: wrap; justify-content: center; margin-top: 10px; width: 100%; }
    .f-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 10px; border-radius: 8px; cursor: pointer; font-size: 11px; }
    .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.95); z-index: 9000; display: none; align-items: center; justify-content: center; padding: 20px; border-radius: 32px; backdrop-filter: blur(5px); }
    .card { background: #111; padding: 20px; border-radius: 25px; border: 1px solid rgba(0,255,204,0.3); width: 100%; max-width: 300px; text-align: center; }
    .input-box input { width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid #333; color: #fff; border-radius: 10px; margin: 5px 0; }
    .btn-submit { width: 100%; padding: 10px; background: var(--gradient); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .list-item { padding: 10px; border-bottom: 1px solid #333; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; }
    #drop-menu { position: absolute; top: 60px; right: 20px; background: #111; border: 1px solid var(--main); border-radius: 10px; display: none; flex-direction: column; z-index: 9999; width: 160px; }
    .m-item { padding: 12px; font-size: 12px; border-bottom: 1px solid #222; cursor: pointer; }
    .icon-box { position: absolute; bottom: 20px; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--main); z-index: 100; }
    .delete-user-icon { right: 20px; background: #ff4444; color: white; border:none; }
    .eq-icon { left: 20px; background: #333; color: white; }
</style>
</head>
<body>

<button onclick="installApp()" id="install-btn" class="hidden">📲 INSTALL APP</button>

<div class="device" id="frame">
    <div class="status-bar"><span id="clock">00:00</span><span id="bat-val">BAT: --%</span></div>
    
    <div id="login-box" class="overlay"><div class="card"><h3>Login</h3><div class="input-box"><input type="number" id="l-phone" placeholder="Phone"></div><div class="input-box"><input type="password" id="l-pass" placeholder="Password"></div><button class="btn-submit" onclick="handleLogin()">SIGN IN</button><button onclick="hidePop()" style="background:none; color:gray; border:none; margin-top:10px;">Close</button></div></div>
    <div id="reg-box" class="overlay"><div class="card"><h3>Register</h3><div class="input-box"><input type="text" id="r-name" placeholder="Name"></div><div class="input-box"><input type="number" id="r-phone" placeholder="Phone"></div><div class="input-box"><input type="password" id="r-pass" placeholder="Password"></div><button class="btn-submit" onclick="handleRegister()">SIGN UP</button><button onclick="hidePop()" style="background:none; color:gray; border:none; margin-top:10px;">Close</button></div></div>
    <div id="upi-box" class="overlay"><div class="card"><h3>Support Kaushal Ji</h3><img src="https://api.qrserver.com/v1/create-qr-code/?size=140x140&data=upi://pay?pa=mandavikaushal913@okaxis" width="140"><p>mandavikaushal913@okaxis</p><button class="btn-submit" onclick="hidePop()">Close</button></div></div>

    <div class="header">
        <div onclick="showLogin()"><div class="icon-btn" id="login-trigger">🔐</div><span class="icon-label">Login</span></div>
        <div style="text-align:center;"><b style="color:var(--main);">MI PLAYER PRO</b>
            <select onchange="setView(this.value)" style="background:none; color:#888; border:none; font-size:10px; display:block; margin:auto;">
                <option value="mobile">Mobile</option>
                <option value="laptop">Laptop</option>
            </select>
        </div>
        <div onclick="shareApp()"><div class="icon-btn">📤</div><span class="icon-label">Share</span></div>
        <div onclick="toggleMenu(event)" style="cursor:pointer; color:var(--main); font-size:20px;">⋮</div>
    </div>

    <div id="drop-menu">
        <div class="m-item" onclick="showReg()">🆔 Register Account</div>
        <div class="m-item" onclick="window.open('https://wa.me/919129191898')">💬 WhatsApp</div>
        <div class="m-item" onclick="showUPI()">💰 Support (UPI)</div>
        <div class="m-item" style="color:red;" onclick="location.reload()">📴 Logout</div>
    </div>

    <div class="main-container">
        <div class="player-side">
            <div id="user-welcome" style="color:var(--main); font-weight:bold;">Guest Mode</div>
            <div id="track-title" style="color:#888; font-size:11px; margin-top:5px;">No Media</div>
            
            <div class="display-area">
                <div id="music-ui" class="music-anim">🎵</div>
                <video id="vid-p" controls></video>
                <img id="img-p">
                <iframe id="doc-viewer"></iframe>
            </div>

            <input type="range" id="seek" class="seek-bar" value="0">
            
            <div class="controls">
                <button onclick="changeTrack(-1)" style="background:none; border:none; color:#fff; font-size:25px;">⏮</button>
                <button id="play-trigger" class="p-btn" onclick="handlePlay()">▶</button>
                <button onclick="changeTrack(1)" style="background:none; border:none; color:#fff; font-size:25px;">⏭</button>
            </div>

            <div class="btn-group">
                <label class="f-btn">🎵 Audio <input type="file" hidden multiple accept="audio/*" onchange="importFiles(event, 'audio')"></label>
                <label class="f-btn">🎥 Video <input type="file" hidden multiple accept="video/*" onchange="importFiles(event, 'video')"></label>
                <label class="f-btn">📄 Doc <input type="file" hidden multiple accept=".pdf,.txt" onchange="importFiles(event, 'doc')"></label>
            </div>

            <div class="icon-box eq-icon" onclick="downloadCurrentFile()">📥</div>
            <div class="icon-box delete-user-icon" onclick="alert('Account feature coming soon!')">🗑️</div>
            
            <div id="mobile-playlist" style="width:100%; margin-top:20px; text-align:left;">
                <b style="font-size:11px; color:var(--main);">Current Playlist</b>
                <div id="m-list-cont"></div>
            </div>
        </div>
        <div class="playlist-side" id="side-list"><b style="color:var(--main);">Master Playlist</b><div id="l-list-cont"></div></div>
    </div>
</div>

<script>
    // Firebase Init (Aapki keys)
    const firebaseConfig = {
        apiKey: "AIzaSyDQ0Y8M9OGSInOlUltuysgmKOYGKX8dQvg",
        authDomain: "calculator-by-kaushalji.firebaseapp.com",
        databaseURL: "https://calculator-by-kaushalji-default-rtdb.firebaseio.com",
        projectId: "calculator-by-kaushalji",
        storageBucket: "calculator-by-kaushalji.firebasestorage.app",
        messagingSenderId: "156130281294",
        appId: "1:156130281294:web:73b80a5f344daeabdd001f"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let playlist = [], cursor = 0, currentUser = null;
    let audio = new Audio();
    let video = document.getElementById('vid-p');
    let active = audio;


    // --- Battery & Clock ---
    setInterval(() => {
        const d = new Date();
        document.getElementById('clock').innerText = d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0');
    }, 1000);

    navigator.getBattery().then(bat => {
        const update = () => document.getElementById('bat-val').innerText = `BAT: ${Math.round(bat.level * 100)}%`;
        update(); bat.onlevelchange = update;
    });

    // --- Functions ---
    function toBase64(file) {
        return new Promise((r) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = () => r(reader.result);
        });
    }

    async function handleRegister() {
        const n = document.getElementById('r-name').value, p = document.getElementById('r-phone').value, pw = document.getElementById('r-pass').value;
        if(!p || !pw) return alert("Fill all fields!");
        await db.ref('users/' + p).set({ name: n, phone: p, password: pw });
        alert("Success!"); hidePop();
    }

    async function handleLogin() {
        const p = document.getElementById('l-phone').value, pw = document.getElementById('l-pass').value;
        const snap = await db.ref('users/' + p).once('value');
        if(snap.exists() && snap.val().password === pw) {
            currentUser = snap.val();
            document.getElementById('user-welcome').innerText = "Namaste, " + currentUser.name;
            hidePop(); syncCloud();
        } else alert("Wrong details!");
    }

    async function importFiles(e, type) {
        const files = Array.from(e.target.files);
        for(let file of files) {
            const b64 = await toBase64(file);
            const item = { name: file.name, url: b64, type: type };
            if(currentUser) db.ref('playlists/' + currentUser.phone).push(item);
            else { playlist.push(item); renderLists(); }
        }
    }

    function syncCloud() {
        db.ref('playlists/' + currentUser.phone).on('value', snap => {
            playlist = [];
            snap.forEach(child => { let d = child.val(); d.id = child.key; playlist.push(d); });
            renderLists();
        });
    }

    function renderLists() {
        const conts = [document.getElementById('m-list-cont'), document.getElementById('l-list-cont')];
        conts.forEach(c => {
            if(!c) return; c.innerHTML = "";
            playlist.forEach((item, i) => {
                c.innerHTML += `<div class="list-item"><span onclick="loadTrack(${i})">${item.name}</span><b onclick="deleteTrack('${item.id}', ${i})">🗑️</b></div>`;
            });
        });
    }

    function loadTrack(i) {
        cursor = i; const item = playlist[i];
        audio.pause(); video.pause();
        document.getElementById('music-ui').style.display = 'none';
        document.getElementById('vid-p').style.display = 'none';
        document.getElementById('img-p').style.display = 'none';
        document.getElementById('doc-viewer').style.display = 'none';
        
        document.getElementById('track-title').innerText = item.name;

        if(item.type === 'audio') { 
            document.getElementById('music-ui').style.display = 'flex'; 
            active = audio; audio.src = item.url; audio.play(); 
        } else if(item.type === 'video') { 
            document.getElementById('vid-p').style.display = 'block'; 
            active = video; video.src = item.url; video.play(); 
        } else if(item.type === 'image') {
            document.getElementById('img-p').style.display = 'block';
            document.getElementById('img-p').src = item.url;
        } else if(item.type === 'doc') {
            document.getElementById('doc-viewer').style.display = 'block';
            document.getElementById('doc-viewer').src = item.url;
        }
        document.getElementById('play-trigger').innerText = '⏸';
    }

    function handlePlay() {
        if(active.paused) { active.play(); document.getElementById('play-trigger').innerText = '⏸'; }
        else { active.pause(); document.getElementById('play-trigger').innerText = '▶'; }
    }

    function changeTrack(dir) {
        cursor += dir;
        if(cursor >= 0 && cursor < playlist.length) loadTrack(cursor);
    }

    function deleteTrack(id, index) {
        if(currentUser && id) db.ref('playlists/' + currentUser.phone + '/' + id).remove();
        else { playlist.splice(index, 1); renderLists(); }
    }

    function downloadCurrentFile() {
        if (!playlist[cursor]) return;
        const a = document.createElement('a'); a.href = playlist[cursor].url;
        a.download = playlist[cursor].name; a.click();
    }

    function shareApp() { 
        if(navigator.share) navigator.share({title:'MI Player', url: window.location.href});
        else alert(window.location.href);
    }

    function showLogin() { document.getElementById('login-box').style.display='flex'; }
    function showReg() { document.getElementById('reg-box').style.display='flex'; }
    function showUPI() { document.getElementById('upi-box').style.display='flex'; }
    function hidePop() { document.querySelectorAll('.overlay').forEach(o => o.style.display='none'); }
    function toggleMenu(e) { e.stopPropagation(); const m = document.getElementById('drop-menu'); m.style.display = (m.style.display === 'flex') ? 'none' : 'flex'; }
    function setView(v) { const f = document.getElementById('frame'); v === 'laptop' ? f.classList.add('laptop-mode') : f.classList.remove('laptop-mode'); }
    
    audio.ontimeupdate = video.ontimeupdate = () => {
        const s = document.getElementById('seek');
        if(active.duration) { s.max = active.duration; s.value = active.currentTime; }
    };
    document.getElementById('seek').oninput = (e) => active.currentTime = e.target.value;
    window.onclick = () => document.getElementById('drop-menu').style.display='none';
</script>

<script>

    // --- PWA Logic ---
    let defPrompt;
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        defPrompt = e;
        document.getElementById('install-btn').classList.remove('hidden');
    });

    function installApp() {
        if (defPrompt) {
            defPrompt.prompt();
            defPrompt.userChoice.then((choice) => {
                if (choice.outcome === 'accepted') document.getElementById('install-btn').classList.add('hidden');
                defPrompt = null;
            });
        }
    }

    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(err => console.log("SW Error", err));
    }

    
</script>


    
</body>
</html>
