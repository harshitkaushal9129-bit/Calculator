<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNT Official Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-user-select: none; user-select: none; }
        body { background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; overflow-x: hidden; }
        .glass-header { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); padding: 15px; }
        .profile-img { width: 60px; height: 60px; border-radius: 50%; border: 2px solid #0ea5e9; object-cover: cover; }
        .app-info-box { background: rgba(14, 165, 233, 0.1); border: 1px solid rgba(14, 165, 233, 0.2); border-radius: 12px; padding: 10px; font-size: 11px; }
        .audio-card { background: linear-gradient(145deg, #111, #000); border: 1px solid #222; border-radius: 20px; transition: 0.3s; }
        .audio-card:active { transform: scale(0.98); border-color: #0ea5e9; }
        .neon-text { text-shadow: 0 0 10px rgba(14, 165, 233, 0.5); }
        .status-badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; text-transform: uppercase; }
        .scroll-hide::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="pb-24">

    <header class="glass-header sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <img id="top-user-img" src="./SNT.jpg" class="profile-img shadow-lg shadow-sky-500/20">
                <div>
                    <h2 id="top-user-name" class="text-sm font-bold truncate w-24 md:w-auto">Loading...</h2>
                    <p id="top-user-email" class="text-[10px] text-slate-400 truncate w-24 md:w-auto">---</p>
                    <span id="top-user-status" class="status-badge bg-sky-500/20 text-sky-400 border border-sky-500/30">Syncing</span>
                </div>
            </div>

            <div class="app-info-box flex-1 max-w-[200px]">
                <div class="flex justify-between mb-1">
                    <span class="text-slate-500">App:</span>
                    <span class="text-sky-400 font-bold">Official Portal</span>
                </div>
                <div class="flex justify-between mb-1">
                    <span class="text-slate-500">Dev:</span>
                    <span class="text-white">Kaushal Ji</span>
                </div>
                <a href="https://harshitkaushal9129-bit.github.io/Dashboard-of-snt/" target="_blank" class="block text-center mt-1 text-[9px] bg-sky-500 text-white rounded py-1 font-bold">OFFICIAL PORTAL LINK</a>
            </div>
        </div>
    </header>

    <main class="p-4 max-w-4xl mx-auto">
        <div class="flex items-center justify-between mb-4 mt-2">
            <h3 class="text-lg font-black italic tracking-widest neon-text uppercase">Audio Library</h3>
            <i class="fas fa-music text-sky-500 animate-bounce"></i>
        </div>

        <div id="audio-list" class="space-y-3">
            <div class="audio-card p-4 flex items-center gap-4">
                <div class="w-12 h-12 bg-sky-900/30 rounded-lg flex items-center justify-center">
                    <i class="fas fa-play text-sky-400"></i>
                </div>
                <div class="flex-1">
                    <h4 class="text-sm font-bold">Class Recording #1</h4>
                    <p class="text-[10px] text-slate-500 uppercase">SNT Study Material</p>
                </div>
                <span class="text-[10px] text-slate-400 italic">3:45</span>
            </div>
        </div>

        <div class="mt-8">
            <p class="text-[10px] font-black text-sky-500 uppercase tracking-widest border-l-2 border-sky-500 pl-2 mb-4">Account Controls</p>
            <div class="grid grid-cols-2 gap-3">
                <button onclick="document.getElementById('voice-modal').style.display='flex'" class="bg-white/5 border border-white/10 p-3 rounded-xl text-[10px] font-bold flex items-center gap-2">
                    <i class="fas fa-microphone"></i> VOICE GUIDE
                </button>
                <button onclick="logout()" class="bg-red-500/10 border border-red-500/20 p-3 rounded-xl text-[10px] font-bold text-red-500 flex items-center gap-2">
                    <i class="fas fa-sign-out-alt"></i> LOGOUT
                </button>
            </div>
        </div>
    </main>

    <div id="voice-modal" class="fixed inset-0 bg-black/90 z-[60] hidden items-center justify-center p-6 backdrop-blur-md">
        <div class="bg-slate-900 border border-white/10 p-6 rounded-[30px] w-full max-w-sm text-center">
            <h2 class="text-xl font-black italic mb-4">COMMAND LIST</h2>
            <div class="text-left space-y-2 text-xs">
                <div class="p-2 bg-white/5 rounded">"Open Profile" - Shows details</div>
                <div class="p-2 bg-white/5 rounded">"Play Music" - Starts Player</div>
            </div>
            <button onclick="this.parentElement.parentElement.style.display='none'" class="mt-6 w-full bg-sky-500 py-3 rounded-xl font-bold">CLOSE</button>
        </div>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = { 
            apiKey: "AIzaSyAOQtM_XYLqPgxMK1XBdfl0m7KoAseZRCA", 
            authDomain: "snt-computer-institute.firebaseapp.com", 
            databaseURL: "https://snt-computer-institute-default-rtdb.firebaseio.com", 
            projectId: "snt-computer-institute"
        };
        firebase.initializeApp(firebaseConfig);
        
        const auth = firebase.auth();
        const db = firebase.database();

        auth.onAuthStateChanged((user) => {
            if (user) {
                // Header Profile Update
                document.getElementById('top-user-name').innerText = user.displayName || "Kaushal Ji User";
                document.getElementById('top-user-email').innerText = user.email;
                document.getElementById('top-user-img').src = user.photoURL || './SNT.jpg';
                
                // Fetching Extra Data from DB
                db.ref('students').on('value', (snap) => {
                    if(snap.exists()) {
                        const data = Object.values(snap.val()).find(s => s.email === user.email);
                        if(data) {
                            document.getElementById('top-user-name').innerText = data.name;
                            document.getElementById('top-user-status').innerText = data.registrationStatus || "Active";
                        }
                    }
                });
            } else {
                // Redirect if not logged in
                console.log("No user session.");
            }
        });

        function logout() {
            auth.signOut().then(() => { location.reload(); });
        }
    </script>

    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(reg => {
            // Background Sync Register karna
            if ('sync' in reg) {
                window.addEventListener('online', () => {
                    reg.sync.register('check-for-updates');
                    console.log("Net wapas aaya! Update checking in background...");
                });
            }
        });

        // Agar naya version mil jaye toh user ko bataye bina refresh kar dena
        navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log("Naya Update mil gaya! App refresh ho rahi hai...");
            window.location.reload();
        });
    }
    </script>
</body>
</html>
