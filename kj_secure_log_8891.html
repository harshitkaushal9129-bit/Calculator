<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRO CONTROL - KAUSHAL JI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --neon: #00ffcc; --bg: #050505; --red: #ff3333; --wa: #25D366; --panel: #111; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 10px; }
        
        .pass-text { color: #ffcc00; filter: blur(6px); transition: 0.3s; user-select: none; cursor: pointer; }
        .pass-text:hover { filter: blur(0); }
        
        #lock-screen { position: fixed; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10000; }
        .lock-card { background: var(--panel); padding: 40px; border-radius: 20px; border: 1px solid var(--neon); text-align: center; }
        
        .header { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; padding-bottom: 15px; margin-bottom: 20px; }
        input { padding: 12px; background: #151515; border: 1px solid #333; color: #fff; border-radius: 8px; outline: none; }
        
        .stats-container { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        .stat-card { background: var(--panel); padding: 20px; border-radius: 12px; flex: 1; min-width: 200px; border: 1px solid #222; text-align: center;}
        .stat-card h3 { color: var(--neon); margin: 0; font-size: 24px; }
        .stat-card p { margin: 5px 0 0; color: #aaa; font-size: 14px; }

        table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 12px; overflow: hidden; min-width: 800px; }
        th { background: #1a1a1a; color: var(--neon); padding: 15px; text-align: left; text-transform: uppercase; font-size: 12px; }
        td { padding: 12px 15px; border-bottom: 1px solid #222; font-size: 14px; }
        tr:hover { background: #161616; }

        .user-pic { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; border: 2px solid #333; }
        .btn { border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; font-size: 12px; }
        .btn-del { background: rgba(255, 51, 51, 0.1); color: var(--red); border: 1px solid var(--red); }
        .btn-del:hover { background: var(--red); color: #fff; }
        .btn-wa { background: rgba(37, 211, 102, 0.1); color: var(--wa); border: 1px solid var(--wa); margin-right: 5px; }
        .btn-wa:hover { background: var(--wa); color: #fff; }
        .btn-bulk { background: var(--wa); color: #000; padding: 12px 20px; }
        
        .ip-badge { background: #222; color: #aaa; padding: 3px 6px; border-radius: 4px; font-family: monospace; font-size: 12px; }

        @media (max-width: 600px) {
            .header { flex-direction: column; }
            #search { width: 100% !important; }
        }
    </style>
</head>
<body>

<div id="lock-screen">
    <div class="lock-card">
        <h1 style="color:var(--neon); margin-top:0;">🔐 KAUSHAL JI</h1>
        <input type="password" id="m-key" placeholder="Enter Master Key..." onkeypress="if(event.key==='Enter') verify()">
        <br><br>
        <button onclick="verify()" style="background:var(--neon); border:none; padding:12px 30px; border-radius:8px; cursor:pointer; font-weight:bold; width:100%;">UNLOCK PANEL</button>
    </div>
</div>

<div id="admin-panel" style="display:none;">
    <div class="header">
        <h2>🔥 MI PRO DASHBOARD</h2>
        <input type="text" id="search" placeholder="🔍 Search Name or Phone..." onkeyup="filterUsers()" style="width:250px;">
        <button onclick="location.reload()" style="background:#ff3333; color:white; border:none; padding:10px 20px; border-radius:8px; cursor:pointer;">LOGOUT</button>
    </div>

    <div class="stats-container">
        <div class="stat-card">
            <h3 id="total-users">0</h3>
            <p>Total Users</p>
        </div>
        <div class="stat-card">
            <h3 id="active-today" style="color:var(--wa);">0</h3>
            <p>Active Today</p>
        </div>
        <div class="stat-card">
            <button class="btn btn-bulk" onclick="sendBulkWA()">📢 Bulk WhatsApp</button>
        </div>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>Profile</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Password</th>
                    <th>IP Address</th>
                    <th>Last Seen</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="user-rows"></tbody>
        </table>
    </div>
</div>

<script>
    const SECRET = "KAUSHAL@9129"; 
    const firebaseConfig = {
        apiKey: "AIzaSyDQ0Y8M9OGSInOlUltuysgmKOYGKX8dQvg",
        databaseURL: "https://calculator-by-kaushalji-default-rtdb.firebaseio.com",
        projectId: "calculator-by-kaushalji",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function verify() {
        if(document.getElementById('m-key').value === SECRET) {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
            startListening();
        } else { alert("❌ Unauthorized Access!"); }
    }

    let allUsers = [];

    function startListening() {
        db.ref('users').on('value', (snap) => {
            allUsers = [];
            let activeToday = 0;
            const now = new Date().getTime();

            snap.forEach((childSnap) => {
                let user = childSnap.val();
                user.phone = childSnap.key;
                allUsers.push(user);

                if (user.lastLogin && (now - user.lastLogin) < 86400000) {
                    activeToday++;
                }
            });

            document.getElementById('total-users').innerText = allUsers.length;
            document.getElementById('active-today').innerText = activeToday;
            renderTable(allUsers);
        });
    }

    function renderTable(data) {
        const container = document.getElementById('user-rows');
        container.innerHTML = "";
        
        [...data].reverse().forEach(user => {
            const tr = document.createElement('tr');
            
            let lastSeenText = "Never";
            if(user.lastLogin) {
                const date = new Date(user.lastLogin);
                lastSeenText = date.toLocaleTimeString() + " " + date.toLocaleDateString();
            }

            // IP Address show karne ka logic
            const ipDisplay = user.ipData ? `<span class="ip-badge">${user.ipData}</span>` : `<span style="color:#666;">Unknown</span>`;

            tr.innerHTML = `
                <td><img src="${user.profilePic || 'https://i.imgur.com/2K1z6Kx.png'}" class="user-pic"></td>
                <td><b>${user.name}</b></td>
                <td>${user.phone}</td>
                <td><span class="pass-text">${user.password}</span></td>
                <td>${ipDisplay}</td>
                <td>${lastSeenText}</td>
                <td>
                    <button class="btn btn-wa" onclick="sendWhatsApp('${user.phone}', '${user.name}')">MSG</button>
                    <button class="btn btn-del" onclick="deleteUser('${user.phone}')">Del</button>
                </td>
            `;
            container.appendChild(tr);
        });
    }

    function filterUsers() {
        const term = document.getElementById('search').value.toLowerCase();
        renderTable(allUsers.filter(u => u.name.toLowerCase().includes(term) || u.phone.includes(term)));
    }

    function sendWhatsApp(phone, name) {
        const msg = encodeURIComponent(`Namaste ${name} Ji, MI PLAYER PRO mein register karne ke liye shukriya! 🙏 - Kaushal Ji`);
        window.open(`https://wa.me/91${phone}?text=${msg}`, '_blank');
    }

    function sendBulkWA() {
        const msg = encodeURIComponent(`Hello PRO Users! 📢 App mein naya update aaya hai, jaldi check karein! - Kaushal Ji`);
        allUsers.forEach(user => {
            window.open(`https://wa.me/91${user.phone}?text=${msg}`, '_blank');
        });
        alert("Bulk messaging initiated. Please allow pop-ups.");
    }

    async function deleteUser(id) {
        if(confirm(`⚠️ User ${id} delete karein?`)) {
            await db.ref('users/' + id).remove();
            await db.ref('playlists/' + id).remove();
        }
    }

    document.addEventListener('contextmenu', e => e.preventDefault());
</script>
</body>
</html>
